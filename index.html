<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汴京娘子調養記 - 豪華典藏版</title>
    <style>
        :root {
            --gold: #d4af37;
            --gold-dark: #aa8620;
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(18, 18, 20, 0.95);
            --red-accent: #8b1e28;
            --text-main: #f0ebd8;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Kaiti', '標楷體', 'Times New Roman', serif;
            overflow: hidden; 
            color: var(--text-main);
            user-select: none; -webkit-user-select: none;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }
        #game-container {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        canvas {
            display: block; width: 100%; height: 100%;
            cursor: crosshair; touch-action: none;
            z-index: 1;
        }
        
        #sys-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            z-index: 100; display: none; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .menu-panel {
            width: 90%; max-width: 800px; max-height: 80vh;
            background: var(--panel-bg);
            border: 2px solid var(--gold); border-radius: 8px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            padding: 30px; overflow-y: auto; position: relative;
        }
        .menu-panel::before, .menu-panel::after {
            content: ''; position: absolute; width: 20px; height: 20px; border: 2px solid var(--gold);
        }
        .menu-panel::before { top: 5px; left: 5px; border-right: none; border-bottom: none; }
        .menu-panel::after { bottom: 5px; right: 5px; border-left: none; border-top: none; }
        
        .menu-title {
            text-align: center; font-size: 32px; color: var(--gold);
            margin-bottom: 20px; border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 10px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .sys-btn {
            background: linear-gradient(180deg, rgba(40,30,20,0.9) 0%, rgba(20,15,10,0.9) 100%);
            border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 24px; font-size: 20px; font-family: inherit;
            border-radius: 4px; cursor: pointer; transition: all 0.2s;
            margin: 10px; text-shadow: 1px 1px 2px #000;
        }
        .sys-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }
        .close-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--gold); font-size: 28px; cursor: pointer; }
        
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;
        }
        .achievement-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 15px; border-radius: 6px; text-align: center;
        }
        .achievement-card.locked { opacity: 0.5; filter: grayscale(100%); }
        .achievement-card h3 { color: var(--gold); margin: 0 0 10px 0; font-size: 20px; }
        .achievement-card p { color: #ccc; margin: 0; font-size: 14px; line-height: 1.4; }
        
        #btn-sys-toggle {
            position: absolute; top: 20px; right: 20px; z-index: 50;
            background: rgba(10,10,10,0.8); border: 1px solid var(--gold);
            color: var(--gold); padding: 8px 15px; border-radius: 4px; cursor: pointer;
            font-family: inherit; font-size: 18px; display: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <button id="btn-sys-toggle" onclick="toggleMenu()">☰ 系統選單</button>
    <canvas id="gameCanvas"></canvas>
    
    <div id="sys-menu">
        <div class="menu-panel">
            <button class="close-btn" onclick="toggleMenu()">×</button>
            <div class="menu-title" id="menu-title">系統選單</div>
            
            <div id="menu-main" style="text-align: center;">
                <button class="sys-btn" onclick="saveGame()">儲存進度</button>
                <button class="sys-btn" onclick="loadGame()">讀取進度</button>
                <button class="sys-btn" onclick="showGallery()">侯府圖鑑</button>
                <button class="sys-btn" onclick="showAchievements()">光輝成就</button>
                <button class="sys-btn" style="border-color: #8b1e28; color: #ffcccc;" onclick="window.location.reload()">回到標題</button>
            </div>
            
            <div id="menu-gallery" style="display: none;">
                <div class="grid-container" id="gallery-grid"></div>
                <div style="text-align:center; margin-top:20px;"><button class="sys-btn" onclick="backToMenuMain()">返回</button></div>
            </div>
            
            <div id="menu-achievements" style="display: none;">
                <div class="grid-container" id="achievements-grid"></div>
                <div style="text-align:center; margin-top:20px;"><button class="sys-btn" onclick="backToMenuMain()">返回</button></div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas ? canvas.getContext('2d') : null; 

    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            r = r || 0; this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r); return this;
        };
    }

    const FONT_FAMILY = '"Kaiti", "標楷體", "Times New Roman", serif';
    let dpr = window.devicePixelRatio || 1;
    let cw = window.innerWidth; let ch = window.innerHeight;
    
    function resize() {
        cw = window.innerWidth; ch = window.innerHeight;
        if(canvas) { canvas.width = cw * dpr; canvas.height = ch * dpr; }
    }
    window.addEventListener('resize', resize); resize();

    // 狀態機升級
    const STATES = { LOADING: 0, TITLE: 1, DAY_TRANSITION: 2, STORY: 3, QUESTION: 4, FEEDBACK: 5, END: 6, SYSTEM: 7 };
    let currentState = STATES.LOADING; 
    
    let currentDay = 1; let currentStage = null; let currentStoryLine = 0;
    let selectedOptionFeedback = "";
    let mouse = { x: cw/2, y: ch/2, targetX: cw/2, targetY: ch/2, isDown: false };
    let time = 0, dt = 0, lastTime = 0;
    let clickZones = []; 
    let cameraShake = { x: 0, y: 0, amount: 0 };
    let globalAlpha = 1; 

    let player = { 
        knowledge: 50, health: 60, reputation: 50, bond: 50, 
        routes: { virtue: 0, power: 0, medical: 0, family: 0 }, 
        affections: {
            maid: { name: "丫鬟 春桃", current: 20, target: 20, max: 100, color: "#e86f88", status: "陌生" },
            chef: { name: "膳房 總管", current: 20, target: 20, max: 100, color: "#d29c72", status: "陌生" },
            doctor: { name: "太醫 張大人", current: 20, target: 20, max: 100, color: "#6ca07e", status: "陌生" },
            medic: { name: "醫女 蘇氏", current: 20, target: 20, max: 100, color: "#82c0d9", status: "陌生" }
        }
    };

    // 全局資料 (成就、解鎖結局、多周目次數)
    let globalData = {
        playCount: 0,
        unlockedEndings: [],
        achievements: {
            'first_blood': { name: "初入侯府", desc: "完成序章，正式踏入後宅。", unlocked: false },
            'god_hand': { name: "杏林聖手", desc: "醫術路線達到最高，解鎖神醫結局。", unlocked: false },
            'iron_lady': { name: "雷厲風行", desc: "權謀路線達到最高，解鎖掌權結局。", unlocked: false },
            'max_bond': { name: "主僕同心", desc: "任意一位下人好感度達到滿值。", unlocked: false }
        }
    };

    function loadGlobalData() {
        try {
            const saved = localStorage.getItem('bianjing_global');
            if (saved) {
                const parsed = JSON.json(saved);
                globalData.playCount = parsed.playCount || 0;
                globalData.unlockedEndings = parsed.unlockedEndings || [];
                if(parsed.achievements) Object.assign(globalData.achievements, parsed.achievements);
            }
        } catch(e) { console.log("讀取全局存檔失敗"); }
    }
    function saveGlobalData() { localStorage.setItem('bianjing_global', JSON.stringify(globalData)); }

    function showSysMessage(msg) {
        // 簡易的 Canvas 浮動提示
        selectedOptionFeedback = msg;
        let prev = currentState; currentState = STATES.FEEDBACK;
        setTimeout(() => { if(currentState === STATES.FEEDBACK) currentState = prev; }, 1500);
    }

    function saveGame() {
        const saveData = { player, currentDay, currentStage, currentStoryLine };
        localStorage.setItem('bianjing_save', JSON.stringify(saveData));
        toggleMenu(); showSysMessage("進度已儲存。");
    }

    function loadGame() {
        try {
            const saved = localStorage.getItem('bianjing_save');
            if(saved) {
                const data = JSON.parse(saved);
                player = data.player; currentDay = data.currentDay; 
                currentStage = data.currentStage; currentStoryLine = data.currentStoryLine;
                toggleMenu(); currentState = STATES.STORY; showSysMessage("進度讀取成功。");
            } else { alert("沒有找到存檔紀錄。"); }
        } catch(e) { alert("讀取失敗。"); }
    }

    function checkAchievements() {
        if(currentDay > 1 && !globalData.achievements['first_blood'].unlocked) {
            globalData.achievements['first_blood'].unlocked = true; saveGlobalData(); showSysMessage("解鎖成就：初入侯府");
        }
        let maxAffection = Math.max(...Object.values(player.affections).map(a => a.target));
        if(maxAffection >= 90 && !globalData.achievements['max_bond'].unlocked) {
            globalData.achievements['max_bond'].unlocked = true; saveGlobalData(); showSysMessage("解鎖成就：主僕同心");
        }
    }

    function toggleMenu() {
        const menu = document.getElementById('sys-menu');
        if (menu.style.display === 'flex') {
            menu.style.opacity = 0; setTimeout(() => menu.style.display = 'none', 300);
        } else {
            document.getElementById('menu-main').style.display = 'block';
            document.getElementById('menu-gallery').style.display = 'none';
            document.getElementById('menu-achievements').style.display = 'none';
            document.getElementById('menu-title').innerText = "系統選單";
            menu.style.display = 'flex'; setTimeout(() => menu.style.opacity = 1, 10);
        }
    }
    function backToMenuMain() {
        document.getElementById('menu-main').style.display = 'block';
        document.getElementById('menu-gallery').style.display = 'none';
        document.getElementById('menu-achievements').style.display = 'none';
        document.getElementById('menu-title').innerText = "系統選單";
    }
    function showGallery() {
        document.getElementById('menu-main').style.display = 'none';
        document.getElementById('menu-gallery').style.display = 'block';
        document.getElementById('menu-title').innerText = "侯府圖鑑 (解鎖結局)";
        
        const grid = document.getElementById('gallery-grid'); grid.innerHTML = '';
        const allEndings = [
            { id: '【一代宗婦】', desc: "完美結局。智慧、聲望、羈絆與好感皆達頂峰。" },
            { id: '【權傾侯府】', desc: "權謀路線結局。以鐵腕統治後宅。" },
            { id: '【妙手神醫】', desc: "醫術路線結局。懸壺濟世，名留青史。" },
            { id: '【母慈子孝】', desc: "親情路線結局。歲月靜好，母子連心。" },
            { id: '【賢德傳家】', desc: "賢德路線結局。以德服人，名滿京城。" },
            { id: '【積勞成疾】', desc: "體力耗盡的遺憾結局。" }
        ];
        allEndings.forEach(end => {
            const isUnlocked = globalData.unlockedEndings.includes(end.id);
            grid.innerHTML += `<div class="achievement-card ${isUnlocked ? '' : 'locked'}">
                <h3>${isUnlocked ? end.id : '？？？'}</h3>
                <p>${isUnlocked ? end.desc : '尚未解鎖此人生軌跡。'}</p></div>`;
        });
    }
    function showAchievements() {
        document.getElementById('menu-main').style.display = 'none';
        document.getElementById('menu-achievements').style.display = 'block';
        document.getElementById('menu-title').innerText = "光輝成就";
        const grid = document.getElementById('achievements-grid'); grid.innerHTML = '';
        for(let key in globalData.achievements) {
            let ach = globalData.achievements[key];
            grid.innerHTML += `<div class="achievement-card ${ach.unlocked ? '' : 'locked'}">
                <h3>${ach.name}</h3><p>${ach.unlocked ? ach.desc : '未達成'}</p></div>`;
        }
    }

    const daysData = [
        { day: "產後第一天", weather: "sunny", location: "侯府臥房", role: "maid", event: "初為人母，您抱著剛出生的孩兒，心中充滿溫暖。但初乳的分泌與照護立刻成為了首要挑戰。" },
        { day: "產後第二天", weather: "cloudy", location: "廚房", role: "chef", event: "產後體虛，膳房送來了各式大補之物。如何在發奶與恢復中取得平衡，考驗著您的智慧。" },
        { day: "產後第三天", weather: "rainy", location: "太醫院", role: "doctor", event: "今日太醫來請平安脈。哺乳時的疼痛與身心變化，需要專業的醫理來調適。" },
        { day: "產後第四天", weather: "snowy", location: "庭院", role: "medic", event: "氣溫驟降。小少爺似乎有些焦躁不安，醫女前來協助您解讀寶寶的各種信號。" },
        { day: "產後第五天", weather: "sunny", location: "侯府臥房", role: "maid", event: "寶寶的成長速度驚人，尿布與睡眠的規律開始改變，後宅的下人們也在觀察您的應對。" },
        { day: "產後第六天", weather: "cloudy", location: "夜晚侯府", role: "doctor", event: "夜半時分，寶寶頻繁討奶，疲憊感襲來。這是對母親體力與意志力的最大考驗。" },
        { day: "產後第七天", weather: "sunny", location: "庭院", role: "medic", event: "轉眼已至第七日，您逐漸適應了母親的身份。今日的總結，將決定您在侯府的最終地位。" }
    ];

    // 內建題庫 (支援隱藏條件 condition)
    const fallbackQuestions = [
         {
            "category": "產後身心", "character": "丫鬟 春桃",
            "story": ["「夫人，您今日看著窗外的落葉，似乎有些悶悶不樂。是不是奴婢們伺候得不夠周到？」"],
            "question": "面對突如其來的低落情緒與丫鬟的關心，您會怎麼做？",
            "options": [
                { "text": "微笑著握住春桃的手，聊些開心的家常。", "feedback": "【春桃 安心】您選擇敞開心扉，這份真誠的交流讓您的心情平靜了下來。", "expr": "happy", "effects": { "health": 10, "maid": 15, "virtue": 15 } },
                { "text": "立刻振作精神，要求查看近期的侯府帳冊。", "feedback": "【春桃 敬佩】您選擇用責任來掩蓋脆弱。雷厲風行讓人敬佩，但也別忘了適時休息。", "expr": "shocked", "effects": { "reputation": 15, "power": 15, "health": -5 } },
                { "text": "獨自走到搖籃旁，靜靜看著熟睡的孩子。", "feedback": "【內心 溫暖】孩子平靜的呼吸聲是最好的安撫，所有的不安都煙消雲散。", "expr": "normal", "effects": { "bond": 15, "family": 15 } },
                { "text": "【隱藏】向春桃講解產後荷爾蒙變化的醫理，安撫她的擔憂。", "condition": (p) => p.knowledge >= 60, "feedback": "【春桃 崇拜】夫人博學！原來這都是身子在作祟，奴婢明白了！", "expr": "happy", "effects": { "knowledge": 15, "medical": 20, "maid": 20 } }
            ]
        },
        {
            "category": "家庭溝通", "character": "膳房 總管",
            "story": ["「夫人！這十全大補濃湯是老夫人特意吩咐熬製的，最是滋補，您趁熱多喝些！」"],
            "question": "面對長輩的盛情與這碗濃郁的補湯，夫人該如何抉擇？",
            "options": [
                { "text": "溫和地請總管日後多準備清淡高湯，細水長流地調理。", "feedback": "【總管 點頭】您深諳養生之道，清淡的湯水確實讓您的身體感到更加輕盈舒暢。", "expr": "happy", "effects": { "knowledge": 15, "chef": 15, "medical": 15, "health": 10 } },
                { "text": "為了不辜負長輩心意，您選擇細細品嚐完這碗濃湯。", "feedback": "【總管 欣慰】這份濃湯雖讓身體感到些許負擔，但您顧全大局的體貼，讓長輩感到溫暖。", "expr": "normal", "effects": { "health": -10, "family": 15, "virtue": 10 } },
                { "text": "賞賜總管，並將此湯轉賜給府中其他辛勞的僕婦。", "feedback": "【總管 感恩】您懂得將資源做最好的分配，這份大度讓後宅眾人對您更加死心塌地。", "expr": "happy", "effects": { "reputation": 20, "power": 15, "chef": 10 } }
            ]
        },
        {
            "category": "醫療決策", "character": "太醫 張大人",
            "story": ["「夫人，小主子若含乳姿勢不對，只含住乳頭會導致微血管破損流血，切莫輕忽。」"],
            "question": "面對哺乳初期可能遭遇的疼痛，您的處理方針是？",
            "options": [
                { "text": "虛心請教太醫正確的姿勢，並耐心引導寶寶。", "feedback": "【太醫 撫鬚】夫人好學不倦！調整姿勢後，過程變得順利且溫馨。", "expr": "happy", "effects": { "knowledge": 20, "doctor": 15, "medical": 15 } },
                { "text": "忍著疼痛，堅信這是成為母親必須經歷的磨練。", "feedback": "【太醫 嘆息】夫人慈母心腸令人動容。雖然強忍帶來了不適，但羈絆更深了。", "expr": "shocked", "effects": { "health": -15, "family": 20, "bond": 15 } },
                { "text": "命人準備柔軟的羊脂膏，並讓醫女隨侍在側協助。", "feedback": "【太醫 點頭】夫人思慮周全，善用資源與人力，展現了主母的從容。", "expr": "normal", "effects": { "reputation": 10, "power": 15, "health": 5 } }
            ]
        },
        {
            "category": "新生兒作息", "character": "醫女 蘇氏",
            "story": ["「夫人，小少爺近日日夜顛倒，白天睡得沉，夜裡卻精神百倍地哭鬧。」"],
            "question": "為了幫助寶寶建立日夜作息，您決定如何調整環境？",
            "options": [
                { "text": "白天拉開窗簾讓陽光灑入，夜晚則點上微弱的燭光。", "feedback": "【蘇醫女 欣喜】您透過自然的光線變化幫助孩子適應了日夜規律，母子倆都獲得了更好的休息。", "expr": "happy", "effects": { "knowledge": 15, "medic": 20, "medical": 15, "health": 10 } },
                { "text": "親自抱著孩子在庭院走動，用溫暖的懷抱安撫他入睡。", "feedback": "【蘇醫女 柔聲】您選擇用最直接的愛來包容孩子的不安。這份親密的陪伴成為了最美好的回憶。", "expr": "happy", "effects": { "bond": 20, "family": 15, "health": -10 } },
                { "text": "嚴格規定下人夜間不得發出聲響，白日則需維持日常喧鬧。", "feedback": "【蘇醫女 敬畏】您立下明確的規矩，府內作息變得井然有序，少爺也逐漸適應了環境。", "expr": "normal", "effects": { "reputation": 15, "power": 15, "medic": -5 } }
            ]
        }
    ];

    let externalQuestions = [];
    let activePools = {};

    function resetPools() {
        let pool = externalQuestions.length > 0 ? externalQuestions : fallbackQuestions;
        let p_maid = pool.filter(q => q.character && (q.character.includes('丫鬟') || q.character.includes('春桃')));

    class ProceduralLive2DCharacter {

                hairDark: '#0a0b10', hairLight: '#2c2f3f',

        setEmotion(type) {
            switch(type) {
                case 'happy': this.targetExpr = { smile: 1.2, brow: 0.3, eye: 0.9 }; break;
                case 'shocked': this.targetExpr = { smile: -0.3, brow: 0.6, eye: 1.3 }; break;
                case 'angry': this.targetExpr = { smile: -0.6, brow: -0.7, eye: 0.9 }; break;

            }
        }

        update(dt) {
            let spd = this.role === 'chef' ? 1.0 : 1.5;
            if (this.currExpr.smile < -0.3) spd *= 1.5; 
            this.bPhase += dt * spd; this.hPhase += dt * 2.0;

            this.blink -= dt;
            if (this.blink <= 0) { this.eyeOpen -= dt * 15; if (this.eyeOpen <= 0) { this.eyeOpen = 0; this.blink = Math.random() * 3 + 2; } } 
            else { this.eyeOpen += dt * 10; if (this.eyeOpen > 1) this.eyeOpen = 1; }

            this.currExpr.smile += (this.targetExpr.smile - this.currExpr.smile) * dt * 5;
            this.currExpr.brow += (this.targetExpr.brow - this.currExpr.brow) * dt * 5;
            this.currExpr.eye += (this.targetExpr.eye - this.currExpr.eye) * dt * 5;
            this.scale += (1 - this.scale) * dt * 8; this.y += (0 - this.y) * dt * 8;
        }

        reset() { this.scale = 0.5; this.y = 50; }

            let swayX = Math.sin(this.hPhase) * 4; let swayY = Math.cos(this.hPhase * 0.8) * 2;

            ctx.save(); ctx.translate(lookX, lookY + bY * 0.5); this.drawFace(ctx, isMini);

        drawBody(ctx, isMini) {

    let floatingTexts = [];
    class FloatingText {

    function applyEffects(effects) {
        let offsetY = ch/2 - 100; let hasPos = false; let hasNeg = false;
        if (effects) {
            const sm = { 'knowledge': '智慧', 'health': '體力', 'reputation': '聲望', 'bond': '羈絆', 'virtue': '賢德', 'power': '權謀', 'medical': '醫術', 'family': '親情' };
            for (let key in sm) {
                if (effects[key]) {
                    if (['virtue', 'power', 'medical', 'family'].includes(key)) player.routes[key] += effects[key];
                    else player[key] = Math.max(0, Math.min(100, player[key] + effects[key]));
                    let color = effects[key] >= 0 ? '#4caf50' : '#e74c3c';
                    floatingTexts.push(new FloatingText(cw/2, offsetY, `${sm[key]} ${effects[key]>=0?'+':''}${effects[key]}`, color));
                    offsetY -= 40; if(effects[key]>0) hasPos=true; else hasNeg=true;
                }
            }
            const nm = ['maid', 'chef', 'doctor', 'medic'];
            nm.forEach(role => {
                if (effects[role]) {
                    let tc = player.affections[role];
                    if (tc) {
                        tc.target = Math.max(0, Math.min(tc.max, tc.target + effects[role])); 
                        let tgt = tc.target;
                        if(tgt >= 90) tc.status = "★主僕同心"; else if(tgt >= 60) tc.status = "忠誠信任"; else if(tgt >= 30) tc.status = "親近熟悉"; else tc.status = "恭敬守禮";
                        let color = effects[role] >= 0 ? tc.color : "#e74c3c";
                        floatingTexts.push(new FloatingText(cw/2, offsetY, `${tc.name} ${effects[role]>=0?'+':''}${effects[role]}`, color));
                        offsetY -= 40; if(effects[role]>0) hasPos=true; else hasNeg=true;
                    }
                }
            });
        }
        if (hasPos) { bloomIntensity = 1.0; bloomColor = '212,175,55'; } 
        if (hasNeg) { cameraShake.amount = 12; bloomIntensity = 0.5; bloomColor = '139,30,40'; }
        checkAchievements(); // 每次更動屬性後檢查成就
    }

        ctx.fillStyle = '#aa8620';

    function wrapText(ctx, text, maxWidth) {
        let words = text.split(''); let lines = []; let currentLine = '';
        for (let i = 0; i < words.length; i++) {
            let char = words[i];
            if (char === '\n') { lines.push(currentLine); currentLine = ''; continue; }
            let testLine = currentLine + char; let metrics = ctx.measureText(testLine);
            if (metrics.width > maxWidth && currentLine !== '') { lines.push(currentLine); currentLine = char; } else { currentLine = testLine; }
        }
        if (currentLine) lines.push(currentLine); return lines;
    }

    function drawButton(ctx, id, btn, text, isLocked = false) {

        let scale = hover ? (mouse.isDown ? 0.96 : 1.01) : 1;

            btnHs = options.map(opt => wrapText(ctx, opt.text + (opt.condition ? " (條件解鎖)" : ""), boxW - padding * 2 - 30).length * 24 + 30);
            totalBtnH = btnHs.reduce((a,b)=>a+b, 0) + (options.length) * 12;

        let boxH = padding * 2 + contentH + (options ? totalBtnH + 15 : 35);

            ctx.save(); ctx.font = `bold 24px ${FONT_FAMILY}`;
            let tW = ctx.measureText(titleText).width + 60; let tH = 44; let tX = boxX + 25; let tY = boxY - tH / 2;

            ctx.shadowBlur = 0; ctx.fillStyle = '#111'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    function gameLoop(timestamp) {
        if (!timestamp) timestamp = performance.now(); if (!lastTime) lastTime = timestamp;
        dt = (timestamp - lastTime) / 1000 || 0; if (dt > 0.1) dt = 0.016; 
        lastTime = timestamp; time += dt; if (isNaN(time)) time = 0;

        mouse.x += (mouse.targetX - mouse.x) * 10 * dt; mouse.y += (mouse.targetY - mouse.y) * 10 * dt;
        if (cameraShake.amount > 0.1) { cameraShake.x = (Math.random() - 0.5) * cameraShake.amount; cameraShake.y = (Math.random() - 0.5) * cameraShake.amount; cameraShake.amount *= 0.9; } 
        else { cameraShake.x = 0; cameraShake.y = 0; }

        ctx.save(); ctx.scale(dpr, dpr); ctx.translate(cameraShake.x, cameraShake.y);

        if ([STATES.DAY_TRANSITION, STATES.TITLE, STATES.END, STATES.LOADING].includes(currentState)) globalAlpha += (1 - globalAlpha) * dt * 2;
        else globalAlpha = 1;
        if (isNaN(globalAlpha)) globalAlpha = 1; ctx.globalAlpha = globalAlpha;

        drawSceneBackground(ctx);
        ctx.globalCompositeOperation = 'screen'; dustParticles.forEach(p => { p.update(dt); p.draw(ctx); }); ctx.globalCompositeOperation = 'source-over';

        mainCharacter.update(dt); Object.values(npcs).forEach(npc => npc.update(dt));
        
        let activeCharacter = mainCharacter;
        if (currentState !== STATES.LOADING) {
            if ([STATES.STORY, STATES.QUESTION, STATES.FEEDBACK].includes(currentState)) {
                let stage = currentStage || introStage; let cn = stage.character || "";
                if (cn.includes("春桃") || cn.includes("丫鬟")) activeCharacter = npcs.maid;
                else if (cn.includes("總管") || cn.includes("管事")) activeCharacter = npcs.chef;
                else if (cn.includes("張大人") || cn.includes("太醫")) activeCharacter = npcs.doctor;
                else if (cn.includes("蘇氏") || cn.includes("醫女")) activeCharacter = npcs.medic;
                else activeCharacter = mainCharacter;
            }
            if (![STATES.DAY_TRANSITION, STATES.TITLE, STATES.END, STATES.LOADING].includes(currentState)) {
                let charScale = Math.max(1.0, Math.min(cw/600, ch/800) * 2.2);
                activeCharacter.draw(ctx, cw/2, ch/2 + 100, charScale);
            }
        }

        clickZones = []; canvas.style.cursor = 'crosshair'; 

        // 判定是否顯示系統選單按鈕
        const sysBtn = document.getElementById('btn-sys-toggle');
        if([STATES.TITLE, STATES.DAY_TRANSITION, STATES.STORY, STATES.QUESTION, STATES.FEEDBACK].includes(currentState)) {
            sysBtn.style.display = 'block';
        } else { sysBtn.style.display = 'none'; }

        if (currentState === STATES.LOADING) {
             ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,cw,ch); ctx.textAlign = 'center'; ctx.fillStyle = '#d4af37'; ctx.font = `bold 30px ${FONT_FAMILY}`; ctx.fillText("讀取卷宗中...", cw/2, ch/2);
        }
        else if (currentState === STATES.TITLE) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,cw,ch); ctx.textAlign = 'center'; ctx.shadowColor = '#d4af37'; ctx.shadowBlur = 20;
            ctx.fillStyle = '#f0ebd8'; let ts = Math.max(40, Math.min(80, cw * 0.08)); ctx.font = `bold ${ts}px ${FONT_FAMILY}`; ctx.fillText("汴京娘子調養記", cw/2, ch/2 - 120); ctx.shadowBlur = 0;
            ctx.fillStyle = '#d4af37'; ctx.font = `${ts*0.35}px ${FONT_FAMILY}`; ctx.fillText("— 沉浸式古風人生養成 —", cw/2, ch/2 - 50);
            if(globalData.playCount > 0) { ctx.fillStyle = '#82c0d9'; ctx.font = `18px ${FONT_FAMILY}`; ctx.fillText(`【多周目繼承】初始智慧+10, 聲望+10`, cw/2, ch/2); }
            drawButton(ctx, 'btn_start', {x: cw/2 - 120, y: ch/2 + 80, w: 240, h: 60}, globalData.playCount > 0 ? "重啟人生" : "踏入侯府");
        }
        else if (currentState === STATES.DAY_TRANSITION) {
            ctx.fillStyle = 'rgba(10,10,12,0.8)'; ctx.fillRect(0,0,cw,ch);
            let dayInfo = daysData[Math.min(currentDay - 1, daysData.length - 1)];
            ctx.textAlign = 'center'; ctx.shadowColor = '#d4af37'; ctx.shadowBlur = 15;
            ctx.fillStyle = '#d4af37'; ctx.font = `bold 52px ${FONT_FAMILY}`; ctx.fillText(dayInfo.day, cw/2, ch/2 - 80); ctx.shadowBlur = 0;
            ctx.fillStyle = '#f0ebd8'; ctx.font = `24px ${FONT_FAMILY}`;
            let lines = wrapText(ctx, dayInfo.event, Math.min(650, cw - 60)); lines.forEach((l, i) => ctx.fillText(l, cw/2, ch/2 - 10 + i*36));
            ctx.globalAlpha = (Math.sin(time * 3) + 1) * 0.5 * globalAlpha; ctx.fillStyle = '#d4af37'; ctx.font = `bold 20px ${FONT_FAMILY}`; ctx.fillText("◇ 點擊開啟今日篇章 ◇", cw/2, ch/2 + 150); ctx.globalAlpha = globalAlpha;
            clickZones.push({ id: 'screen_next_day', x: 0, y: 0, w: cw, h: ch });
        }
        else if (currentState === STATES.STORY) { drawDatePanel(ctx); drawStatsPanel(ctx); renderDialog(ctx, currentStage.character, currentStage.story[currentStoryLine], null); }
        else if (currentState === STATES.QUESTION) { drawDatePanel(ctx); drawStatsPanel(ctx); renderDialog(ctx, currentStage.character || "內心抉擇", currentStage.question, currentStage.options); }
        else if (currentState === STATES.FEEDBACK) { drawDatePanel(ctx); drawStatsPanel(ctx); renderDialog(ctx, "命運的迴響", selectedOptionFeedback, null); }
        else if (currentState === STATES.END) {
            ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(0,0,cw,ch); ctx.textAlign = 'center'; 
            ctx.fillStyle = currentEnding.color; ctx.font = `bold 56px ${FONT_FAMILY}`; ctx.fillText(currentEnding.title, cw/2, ch/2 - 130);
            ctx.fillStyle = '#f0ebd8'; ctx.font = `22px ${FONT_FAMILY}`; 
            let endLines = wrapText(ctx, currentEnding.desc, Math.min(750, cw - 60)); endLines.forEach((l, i) => ctx.fillText(l, cw/2, ch/2 - 40 + i*36));
            drawButton(ctx, 'btn_restart', {x: cw/2 - 240, y: ch/2 + 140, w: 220, h: 60}, "再次體驗七日");
            drawButton(ctx, 'btn_home', {x: cw/2 + 20, y: ch/2 + 140, w: 220, h: 60}, "返回標題畫面");
        }

        floatingTexts = floatingTexts.filter(t => t.life > 0); floatingTexts.forEach(t => { t.update(); t.draw(ctx); });
        if (bloomIntensity > 0) { ctx.globalCompositeOperation = 'screen'; ctx.fillStyle = `rgba(${bloomColor}, ${bloomIntensity * 0.3})`; ctx.fillRect(0, 0, cw, ch); bloomIntensity -= dt * 1.5; ctx.globalCompositeOperation = 'source-over'; }
        ctx.restore(); requestAnimationFrame(gameLoop);
    }

    function handleInteraction(cx, cy) {
        if(document.getElementById('sys-menu').style.display === 'flex') return; // 選單開啟時封鎖 Canvas 點擊
        
        let clicked = clickZones.find(z => cx >= z.x && cx <= z.x + z.w && cy >= z.y && cy <= z.y + z.h);
        
        if (currentState === STATES.TITLE && clicked && clicked.id === 'btn_start') {
            currentDay = 1; globalAlpha = 0; currentStage = introStage; mainCharacter.setEmotion('normal'); currentState = STATES.STORY;
        }
        else if (currentState === STATES.DAY_TRANSITION && clicked && clicked.id === 'screen_next_day') {
            let role = daysData[currentDay - 1].role;
            currentStage = (activePools[role] && activePools[role].length > 0) ? activePools[role].pop() : fallbackQuestions[0];
            currentStage.location = daysData[currentDay - 1].location;
            mainCharacter.resetAppearance(); currentStoryLine = 0; currentState = STATES.STORY;
        }
        else if (currentState === STATES.STORY && clicked && clicked.id === 'screen_next') {
            currentStoryLine++; if (currentStoryLine >= currentStage.story.length) currentState = STATES.QUESTION;
        }
        else if (currentState === STATES.QUESTION && clicked && clicked.id.startsWith('opt_')) {
            applyChoice(currentStage.options[parseInt(clicked.id.split('_')[1])]);
        }
        else if (currentState === STATES.FEEDBACK && clicked && clicked.id === 'screen_next') {
            if (currentStage === introStage) { currentState = STATES.DAY_TRANSITION; } 
            else {
                currentDay++; currentStoryLine = 0;
                if (currentDay > 7) { currentEnding = determineEnding(); globalAlpha = 0; currentState = STATES.END; mainCharacter.setEmotion('happy'); } 
                else { globalAlpha = 0; currentState = STATES.DAY_TRANSITION; }
            }
        }
        else if (currentState === STATES.END && clicked) {
            if (clicked.id === 'btn_restart') {
                currentDay = 1; player.knowledge = 50; player.health = 60; player.reputation = 50; player.bond = 50;
                player.routes = { virtue: 0, power: 0, medical: 0, family: 0 }; resetPools();
                for(let key in player.affections) { player.affections[key].target = 20; player.affections[key].current = 20; player.affections[key].status = "陌生"; }
                if(globalData.playCount > 0) { player.knowledge+=10; player.reputation+=10; }
                globalAlpha = 0; currentStage = introStage; mainCharacter.setEmotion('normal'); currentState = STATES.STORY;
            } else if (clicked.id === 'btn_home') { window.location.reload(); }
        }
    }

    canvas.addEventListener('mousedown', e => mouse.isDown = true);
    canvas.addEventListener('mouseup', e => { mouse.isDown = false; if (currentState !== STATES.LOADING) handleInteraction((e.clientX - canvas.getBoundingClientRect().left) * (cw / canvas.getBoundingClientRect().width), (e.clientY - canvas.getBoundingClientRect().top) * (ch / canvas.getBoundingClientRect().height)); });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); mouse.isDown = true; let rect = canvas.getBoundingClientRect(); mouse.targetX = (e.touches[0].clientX - rect.left) * (cw / rect.width); mouse.targetY = (e.touches[0].clientY - rect.top) * (ch / rect.height); }, {passive: false});
    canvas.addEventListener('touchend', e => { mouse.isDown = false; if (currentState !== STATES.LOADING) handleInteraction(mouse.targetX, mouse.targetY); });

    loadQuestions(); requestAnimationFrame(gameLoop);
</script>
</body>
</html>
