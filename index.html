<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汴京娘子調養記 - AAA Cinematic Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #05070a;
            font-family: 'Kaiti', '標楷體', 'Times New Roman', serif;
            overflow: hidden; 
            color: #ececec;
            user-select: none; 
            -webkit-user-select: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d'); 

    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            r = r || 0;
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            return this;
        };
    }

    const FONT_FAMILY = '"Kaiti", "標楷體", "Times New Roman", serif';

    let dpr = window.devicePixelRatio || 1;
    let cw = window.innerWidth;
    let ch = window.innerHeight;
    
    function resize() {
        cw = window.innerWidth;
        ch = window.innerHeight;
        canvas.width = cw * dpr;
        canvas.height = ch * dpr;
    }
    window.addEventListener('resize', resize);
    resize();

    // 狀態機
    const STATES = { START: 0, DAY_TRANSITION: 1, FREE_ACTION: 2, ACTION_RESULT: 3, RANDOM_EVENT: 4, HIDDEN_EVENT: 5, INTERACT_CHOICE: 6, STORY: 7, QUESTION: 8, FEEDBACK: 9, END: 10, LOADING: 11 };
    let currentState = STATES.LOADING; 
    let currentDay = 1;
    let currentStage = null;
    let currentStoryLine = 0;
    let selectedOptionFeedback = "";
    
    // CG 演出控制變數
    let isCinematic = false;
    let cinematicLerp = 0;

    let mouse = { x: cw/2, y: ch/2, targetX: cw/2, targetY: ch/2, isDown: false };
    let time = 0, dt = 0, lastTime = 0;
    let clickZones = []; 
    
    let cameraShake = { x: 0, y: 0, amount: 0 };
    let bloomIntensity = 0;
    let bloomColor = '255,255,255';
    let globalAlpha = 1; 
    
    let player = { 
        knowledge: 50, health: 60, reputation: 50, bond: 50, 
        routes: { virtue: 0, power: 0, medical: 0, family: 0 }, 
        affections: {
            maid: { name: "丫鬟 春桃", current: 20, target: 20, max: 100, color: "#e88f99", status: "陌生" },
            chef: { name: "膳房 總管", current: 20, target: 20, max: 100, color: "#b89074", status: "陌生" },
            doctor: { name: "太醫 張大人", current: 20, target: 20, max: 100, color: "#6a8a7a", status: "陌生" },
            medic: { name: "醫女 蘇氏", current: 20, target: 20, max: 100, color: "#7a9ba8", status: "陌生" }
        }
    };

    let currentEnding = null;

    const daysData = [
        { day: "產後第一天", weather: "sunny", location: "侯府臥房", role: "maid", event: "初為人母，您抱著剛出生的孩兒，心中充滿溫暖。但初乳的分泌與照護立刻成為了首要挑戰。" },
        { day: "產後第二天", weather: "cloudy", location: "膳房", role: "chef", event: "產後體虛，膳房送來了各式大補之物。如何在發奶與恢復中取得平衡，考驗著您的智慧。" },
        { day: "產後第三天", weather: "rainy", location: "太醫院", role: "doctor", event: "今日太醫來請平安脈。哺乳時的疼痛與身心變化，需要專業的醫理來調適。" },
        { day: "產後第四天", weather: "snowy", location: "庭院", role: "medic", event: "氣溫驟降。小少爺似乎有些焦躁不安，醫女前來協助您解讀寶寶的各種信號。" },
        { day: "產後第五天", weather: "sunny", location: "侯府臥房", role: "maid", event: "寶寶的成長速度驚人，尿布與睡眠的規律開始改變，後宅的下人們也在觀察您的應對。" },
        { day: "產後第六天", weather: "cloudy", location: "夜晚侯府", role: "doctor", event: "夜半時分，寶寶頻繁討奶，疲憊感襲來。這是對母親體力與意志力的最大考驗。" },
        { day: "產後第七天", weather: "sunny", location: "庭院", role: "medic", event: "轉眼已至第七日，您逐漸適應了母親的身份。今日的總結，將決定您在侯府的最終地位。" }
    ];

    function shuffle(array) {
        let currentIndex = array.length, randomIndex, temp;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex); currentIndex--;
            temp = array[currentIndex]; array[currentIndex] = array[randomIndex]; array[randomIndex] = temp;
        }
        return array;
    }

    let externalQuestions = [];
    let activePools = {};

    function resetPools() {
        let pool = externalQuestions.length > 0 ? externalQuestions : [];
        activePools = { 
            maid: shuffle(pool.filter(q => q.character && (q.character.includes('丫鬟') || q.character.includes('春桃'))).slice()), 
            chef: shuffle(pool.filter(q => q.character && (q.character.includes('膳房') || q.character.includes('總管'))).slice()), 
            doctor: shuffle(pool.filter(q => q.character && (q.character.includes('太醫') || q.character.includes('張大人'))).slice()), 
            medic: shuffle(pool.filter(q => q.character && (q.character.includes('醫女') || q.character.includes('蘇氏'))).slice()) 
        };
    }

    async function loadQuestions() {
        try {
            let res = await fetch('questions.json');
            if (!res.ok) throw new Error("HTTP status " + res.status);
            let data = await res.json();
            if (data && data.length > 0) externalQuestions = data;
        } catch (error) {
            console.warn("無法載入外部題庫。請確保 questions.json 存在。");
        } finally {
            resetPools(); 
            currentState = STATES.START; 
        }
    }

    const introStage = {   
        character: "內心獨白", location: "侯府臥房",
        story: [
            "【序章：侯府主母的挑戰】",
            "我乃大宋名門之女，嫁入這豪門侯府。昨日歷經生死，終於平安誕下了嫡出小少爺。",
            "看著這雕樑畫棟的侯府臥房，我知道，真正的挑戰才剛開始。",
            "產後這七日，不只是調養虛弱的鳳體，更是重新整頓後宅、建立主母威信的關鍵時刻。",
            "府內上下，無數雙眼睛正盯著我。我必須做出抉擇，確立我未來的道路。"
        ],
        question: "【立威抉擇】您決定以何種作風開啟這七日的調養與管家之路？",
        options: [
            { text: "【賢德】以和為貴，溫和對待下人博取美名。", feedback: "您決定以德服人，溫和的氣質讓下人們感到安心。", expr: 'happy', effects: { virtue: 20, health: 10, maid: 10 } },
            { text: "【權謀】恩威並施，藉機敲打下人樹立威嚴。", feedback: "您眼神凌厲，決定趁機立威，絕不容許後宅有絲毫怠慢。", expr: 'normal', effects: { power: 20, reputation: 10, chef: -5 } },
            { text: "【醫術】研讀醫理，科學調養守護母子平安。", feedback: "您深知身體才是本錢，決定以科學醫理武裝自己。", expr: 'happy', effects: { medical: 20, knowledge: 10, doctor: 10 } },
            { text: "【親情】萬事以孩兒為重，親力親為。", feedback: "看著繈褓中的骨肉，您滿眼溫柔，決定將所有心血傾注於他。", expr: 'happy', effects: { family: 20, bond: 10, medic: 5 } }
        ]
    };

    function determineEnding() {
        let r = player.routes;
        let highestRoute = Object.keys(r).reduce((a, b) => r[a] > r[b] ? a : b);

        if (player.health < 30) return { title: "【積勞成疾】", desc: "您將所有精力都傾注在侯府與孩子身上，雖然保全了體面，卻忽略了自己。太醫強烈建議您必須長年臥床休養。這是一條充滿犧牲的道路。", color: "#c0392b" };
        if (highestRoute === 'power') return { title: "【權傾侯府】", desc: "經過這七日的歷練，您展現出卓越的管家手腕與非凡的氣度。恩威並施之下，侯府上下對您心服口服。您成為了這深宅大院中，無人能撼動的當家主母。", color: "#8e44ad" };
        if (highestRoute === 'medical') return { title: "【妙手神醫】", desc: "您悉心研讀醫理，將科學的調養之道與傳統智慧完美融合。這份珍貴的照護經驗更傳承給了府中的下人，在京城醫界留下了佳話。", color: "#27ae60" };
        if (highestRoute === 'family') return { title: "【母慈子孝】", desc: "您將滿腔的溫柔與心血都傾注在孩兒身上。母子連心的羈絆，成為您在這深宅中最堅實的依靠。唯有伴隨孩子平安長大，才是最純粹的幸福。", color: "#f39c12" };
        return { title: "【賢德夫人】", desc: "您以和為貴，寬厚待人，這七日來與後宅眾人建立了深厚的信任。您用包容與智慧化解了種種難題，成為了府中人人敬重的賢德主母。", color: "#2980b9" };
    }

    // --- 高階粒子與環境系統 ---
    class Particle {
        constructor(type) {
            this.type = type; // 'dust', 'petal', 'snow'
            this.x = Math.random() * cw; this.y = Math.random() * ch;
            this.size = Math.random() * (type === 'petal' ? 4 : 2) + 1;
            this.vx = (Math.random() - 0.5) * (type === 'snow' ? 1 : 0.5); 
            this.vy = type === 'dust' ? (Math.random() - 0.5) * 0.5 : (Math.random() * 1 + 0.5);
            this.life = Math.random() * Math.PI * 2;
        }
        update(dt) {
            this.x += this.vx + Math.sin(time + this.life) * (this.type === 'petal' ? 1 : 0.5); 
            this.y += this.vy; this.life += dt;
            if (this.y > ch || this.y < 0) this.y = this.vy > 0 ? 0 : ch; 
            if (this.x < 0) this.x = cw; if (this.x > cw) this.x = 0;
        }
        draw(ctx) {
            let alpha = (Math.sin(this.life * 2) + 1) * 0.4;
            ctx.beginPath();
            if(this.type === 'petal') {
                ctx.fillStyle = `rgba(255, 180, 200, ${alpha})`;
                ctx.ellipse(this.x, this.y, this.size, this.size*0.6, this.life, 0, Math.PI*2);
            } else if (this.type === 'snow') {
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha + 0.2})`;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            } else {
                ctx.fillStyle = `rgba(255, 220, 150, ${alpha})`;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            }
            ctx.fill();
        }
    }
    let particles = [];
    for(let i=0; i<40; i++) particles.push(new Particle('dust'));

    function updateWeather(weather) {
        particles = [];
        let count = weather === 'snowy' ? 60 : (weather === 'cloudy' ? 20 : 40);
        let type = weather === 'snowy' ? 'snow' : (weather === 'cloudy' ? 'petal' : 'dust');
        for(let i=0; i<count; i++) particles.push(new Particle(type));
    }

    // --- 高階古風人物渲染引擎 (半寫實美型) ---
    class PremiumLive2DCharacter {
        constructor(role, customColors) {
            this.role = role; 
            this.bPhase = Math.random() * Math.PI; this.hPhase = Math.random() * Math.PI;
            this.blink = Math.random() * 3; this.eyeOpen = 1;
            this.targetExpr = { smile: 0, brow: 0, eye: 1.0 }; this.currExpr = { smile: 0, brow: 0, eye: 1.0 };
            this.scale = 0; this.y = 100;
            this.colors = customColors;
        }

        setEmotion(type) {
            switch(type) {
                case 'happy': this.targetExpr = { smile: 1.5, brow: 0.4, eye: 0.9 }; break;
                case 'shocked': this.targetExpr = { smile: -0.5, brow: 0.8, eye: 1.2 }; break;
                case 'angry': this.targetExpr = { smile: -0.8, brow: -0.8, eye: 0.85 }; break;
                default: this.targetExpr = { smile: 0.2, brow: 0, eye: 1.0 }; break;
            }
        }

        update(dt) {
            this.bPhase += dt * 1.2; this.hPhase += dt * 1.5;
            this.blink -= dt;
            if (this.blink <= 0) { this.eyeOpen -= dt * 20; if (this.eyeOpen <= 0) { this.eyeOpen = 0; this.blink = Math.random() * 3 + 2; } } 
            else { this.eyeOpen += dt * 15; if (this.eyeOpen > 1) this.eyeOpen = 1; }
            this.currExpr.smile += (this.targetExpr.smile - this.currExpr.smile) * dt * 6;
            this.currExpr.brow += (this.targetExpr.brow - this.currExpr.brow) * dt * 6;
            this.currExpr.eye += (this.targetExpr.eye - this.currExpr.eye) * dt * 6;
            this.scale += (1 - this.scale) * dt * 6; this.y += (0 - this.y) * dt * 6;
        }

        reset() { this.scale = 0.5; this.y = 50; }

        draw(ctx, cx, cy, baseScale, isMini = false) {
            ctx.save();
            ctx.translate(cx, cy + (isMini ? 0 : this.y));
            ctx.scale(baseScale * (isMini ? 1 : this.scale), baseScale * (isMini ? 1 : this.scale));

            let breathY = Math.sin(this.bPhase) * 2;
            let swayX = Math.sin(this.hPhase) * 3;
            let lookX = isMini ? 0 : (mouse.x - cx) * 0.01;
            let lookY = isMini ? 0 : (mouse.y - cy) * 0.01;

            this.drawHair(ctx, swayX, true); // 後髮
            
            ctx.save(); ctx.translate(lookX * 0.4, breathY);
            this.drawBody(ctx, isMini);
            ctx.restore();

            ctx.save(); ctx.translate(lookX, lookY + breathY * 0.5);
            this.drawFace(ctx, isMini);
            this.drawFeatures(ctx);
            ctx.restore();

            this.drawHair(ctx, swayX, false); // 前髮
            
            if(!isMini && !isCinematic) this.drawLighting(ctx, cx, cy);
            ctx.restore();
        }

        drawBody(ctx, isMini) {
            // 寫實修長肩頸
            let silk = ctx.createLinearGradient(0, 0, 0, 350);
            silk.addColorStop(0, this.colors.cloth1); silk.addColorStop(1, this.colors.cloth2);
            ctx.fillStyle = silk;
            ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = isMini ? 0 : 20;
            ctx.beginPath();
            if (this.role === 'chef' || this.role === 'doctor') {
                ctx.moveTo(-160, 350); ctx.quadraticCurveTo(-110, 100, -40, 90); ctx.lineTo(40, 90); ctx.quadraticCurveTo(110, 100, 160, 350);
            } else {
                ctx.moveTo(-140, 350); ctx.quadraticCurveTo(-80, 90, -25, 80); ctx.lineTo(25, 80); ctx.quadraticCurveTo(80, 90, 140, 350);
            }
            ctx.fill(); ctx.shadowBlur = 0;

            // 交領/圓領細節
            let collar = ctx.createLinearGradient(-40, 80, 40, 160);
            collar.addColorStop(0, '#f5f5f5'); collar.addColorStop(1, '#dcdcdc');
            ctx.fillStyle = collar;
            ctx.beginPath();
            if (this.role === 'doctor') {
                ctx.arc(0, 105, 45, Math.PI, 0); ctx.lineTo(45,130); ctx.lineTo(-45,130); ctx.fill();
            } else {
                ctx.moveTo(-45, 80); ctx.lineTo(0, 150); ctx.lineTo(45, 80); ctx.lineTo(70, 100); ctx.lineTo(0, 210); ctx.lineTo(-70, 100); ctx.fill();
            }

            // 頸部與鎖骨陰影
            let neck = ctx.createLinearGradient(0, 40, 0, 90);
            neck.addColorStop(0, this.colors.skinShadow); neck.addColorStop(1, this.colors.skinBase);
            ctx.fillStyle = neck;
            ctx.beginPath(); ctx.moveTo(-20, 30); ctx.lineTo(20, 30); ctx.lineTo(28, 90); ctx.lineTo(-28, 90); ctx.fill();
        }

        drawFace(ctx, isMini) {
            // 半寫實瓜子臉
            let face = ctx.createRadialGradient(0, -10, 10, 0, 0, 90);
            face.addColorStop(0, this.colors.skinHigh); face.addColorStop(0.6, this.colors.skinBase); face.addColorStop(1, this.colors.skinShadow);
            ctx.fillStyle = face;
            ctx.shadowColor = 'rgba(0,0,0,0.15)'; ctx.shadowBlur = isMini ? 0 : 15;
            
            ctx.beginPath();
            if (this.role === 'chef') {
                ctx.moveTo(0, 75); ctx.bezierCurveTo(60, 65, 75, 0, 65, -45); ctx.bezierCurveTo(60, -90, -60, -90, -65, -45); ctx.bezierCurveTo(-75, 0, -60, 65, 0, 75);
            } else if (this.role === 'doctor') {
                ctx.moveTo(0, 70); ctx.bezierCurveTo(45, 55, 55, 0, 50, -45); ctx.bezierCurveTo(45, -90, -45, -90, -50, -45); ctx.bezierCurveTo(-55, 0, -45, 55, 0, 70);
            } else {
                // 女性細長臉型
                ctx.moveTo(0, 65); ctx.bezierCurveTo(35, 55, 50, 0, 45, -50); ctx.bezierCurveTo(40, -90, -40, -90, -45, -50); ctx.bezierCurveTo(-50, 0, -35, 55, 0, 65);
            }
            ctx.fill(); ctx.shadowBlur = 0;

            // 腮紅 (僅女性)
            if (this.role !== 'chef' && this.role !== 'doctor') {
                ctx.globalCompositeOperation = 'multiply';
                let blush = ctx.createRadialGradient(0, 0, 0, 0, 0, 25);
                blush.addColorStop(0, 'rgba(230, 100, 110, 0.15)'); blush.addColorStop(1, 'rgba(230, 100, 110, 0)');
                ctx.save(); ctx.translate(-30, 15); ctx.fillStyle = blush; ctx.beginPath(); ctx.arc(0,0,25,0,Math.PI*2); ctx.fill(); ctx.restore();
                ctx.save(); ctx.translate(30, 15); ctx.fillStyle = blush; ctx.beginPath(); ctx.arc(0,0,25,0,Math.PI*2); ctx.fill(); ctx.restore();
                ctx.globalCompositeOperation = 'source-over';
            }
        }

        drawFeatures(ctx) {
            // 寫實眉毛
            ctx.strokeStyle = this.role==='doctor'?'#2a2a2a':'#4a3a30'; ctx.lineWidth = this.role==='doctor'?3:1.5; ctx.lineCap = 'round';
            let bY = -35; let bA = this.currExpr.brow * 8;
            ctx.beginPath(); ctx.moveTo(-40, bY - bA); ctx.quadraticCurveTo(-25, bY - 3, -12, bY + bA); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(40, bY - bA); ctx.quadraticCurveTo(25, bY - 3, 12, bY + bA); ctx.stroke();

            // 寫實眼眸 (狹長桃花眼)
            let eyeY = -12;
            let eyeS = this.eyeOpen * this.currExpr.eye * (this.role==='doctor'?0.7:1);
            
            const drawEye = (ex, ey, flip) => {
                ctx.save(); ctx.translate(ex, ey); ctx.scale(flip ? -1 : 1, 1);
                
                // 眼白
                ctx.fillStyle = '#fdfdfd'; 
                ctx.beginPath(); ctx.moveTo(-16, 0); ctx.quadraticCurveTo(-2, -10 * eyeS, 14, 2); ctx.quadraticCurveTo(-2, 4 * eyeS, -16, 0); ctx.fill();

                if (eyeS > 0.1) {
                    ctx.save(); ctx.beginPath(); ctx.moveTo(-16, 0); ctx.quadraticCurveTo(-2, -10 * eyeS, 14, 2); ctx.quadraticCurveTo(-2, 4 * eyeS, -16, 0); ctx.clip();
                    // 虹膜漸層
                    let iris = ctx.createRadialGradient(-1, 1, 0, 0, 0, 8);
                    iris.addColorStop(0, this.role==='player'?'#7a5a40':(this.role==='medic'?'#3a4a50':'#3a2a20')); 
                    iris.addColorStop(1, '#111');
                    ctx.fillStyle = iris; ctx.beginPath(); ctx.arc(-2, 0, 6.5, 0, Math.PI*2); ctx.fill();
                    // 瞳孔
                    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-2, 0, 2.5, 0, Math.PI*2); ctx.fill();
                    // 高光
                    ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.beginPath(); ctx.arc(-4, -2, 1.5, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.arc(1, 2, 1, 0, Math.PI*2); ctx.fill();
                    // 睫毛陰影
                    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.arc(0, -9, 10, 0, Math.PI*2); ctx.fill();
                    ctx.restore(); 
                }

                // 上眼線
                ctx.strokeStyle = '#1a1010'; ctx.lineWidth = this.role==='doctor'?1.5:2.5;
                ctx.beginPath(); ctx.moveTo(-18, 1); ctx.quadraticCurveTo(-2, -12 * eyeS, 16, 3); ctx.stroke();
                // 雙眼皮
                if(this.role !== 'chef') {
                    ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 0.8;

            // 嘴唇 (櫻桃小嘴)

            ctx.beginPath(); ctx.moveTo(-8, mY - s*0.5); ctx.quadraticCurveTo(0, mY + s, 8, mY - s*0.5); ctx.quadraticCurveTo(0, mY + 2 + s, -8, mY - s*0.5);

        drawHair(ctx, sway, isBack) {
            let hGrad = ctx.createLinearGradient(0, -100, 0, isBack?300:50);
            hGrad.addColorStop(0, this.colors.hairLight); hGrad.addColorStop(1, isBack?'#000':this.colors.hairDark);
            ctx.fillStyle = hGrad;

            if (isBack) {
                if (this.role === 'chef' || this.role === 'doctor') return;
                ctx.beginPath();
                if (this.role === 'player') {
                    ctx.moveTo(-45, -50); ctx.bezierCurveTo(-90, 50, -110+sway, 250, -70+sway*1.5, 350);
                    ctx.lineTo(70+sway*1.5, 350); ctx.bezierCurveTo(110+sway, 250, 90, 50, 45, -50);
                } else if (this.role === 'maid') {
                    ctx.moveTo(-35, -50); ctx.bezierCurveTo(-70, 50, -80+sway, 150, -60+sway, 180);
                    ctx.lineTo(60+sway, 180); ctx.bezierCurveTo(80+sway, 150, 70, 50, 35, -50);
                } else if (this.role === 'medic') {
                    ctx.arc(0, -30, 45, 0, Math.PI*2);

            } else {
                if (this.role === 'chef') { ctx.beginPath(); ctx.arc(0, -50, 50, Math.PI, 0); ctx.fill(); return; }
                if (this.role === 'doctor') { ctx.fillRect(-45, -95, 90, 50); ctx.beginPath(); ctx.arc(0, -95, 45, Math.PI, 0); ctx.fill(); return; }
                
                ctx.beginPath(); ctx.arc(0, -55, 55, Math.PI, 0); ctx.fill();
                const strand = (sx, sy, cx1, cy1, cx2, cy2, ex, ey, w) => {
                    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.bezierCurveTo(cx1, cy1, cx2, cy2, ex, ey); 
                    ctx.bezierCurveTo(cx2+w, cy2, cx1+w, cy1, sx+w, sy); ctx.fill();

                if (this.role === 'player') {
                    strand(-50, -25, -60, 20, -65+sway, 90, -55+sway, 130, 12);
                    strand(40, -25, 50, 20, 55+sway, 90, 45+sway, 130, 12);
                    strand(-15, -65, -25, -20, -20, 0, -5, 15, 18);
                    strand(5, -65, 15, -20, 20, 0, 30, -5, 20);
                } else if (this.role === 'maid') {
                    ctx.beginPath(); ctx.arc(-40, -85, 20, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(40, -85, 20, 0, Math.PI*2); ctx.fill();

                    strand(0, -60, 15, -20, 25, -10, 35, -5, 20);
                } else if (this.role === 'medic') {
                    strand(-40, -40, -45, 0, -35+sway*0.5, 30, -25+sway*0.5, 50, 15);

    let floatingTexts = [];
    class FloatingText {
        constructor(x, y, text, color) { this.x = x; this.y = y; this.text = text; this.color = color; this.life = 1.0; this.s = 0.5; }
        update() { this.y -= 1; this.life -= 0.012; this.s += (1 - this.s) * 0.15; }
        draw(ctx) {

            ctx.fillStyle = this.color; ctx.font = `bold 26px ${FONT_FAMILY}`; ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;

    function applyEffects(effects) {
        let offsetY = ch/2 - 100;
        let hasPositive = false; let hasNegative = false;
        if (effects) {
            const sm = { 'knowledge': '智慧', 'health': '體力', 'reputation': '聲望', 'bond': '羈絆', 'virtue': '賢德', 'power': '權謀', 'medical': '醫術', 'family': '親情' };
            for (let key in sm) {
                if (effects[key]) {
                    if (['virtue', 'power', 'medical', 'family'].includes(key)) player.routes[key] += effects[key];
                    else player[key] = Math.max(0, Math.min(100, player[key] + effects[key]));
                    let color = effects[key] >= 0 ? '#2ecc71' : '#e74c3c';
                    floatingTexts.push(new FloatingText(cw/2, offsetY, `${sm[key]} ${effects[key]>=0?'+':''}${effects[key]}`, color));
                    offsetY -= 40;
                    if(effects[key] > 0) hasPositive = true; else hasNegative = true;
                }
            }
            const nm = ['maid', 'chef', 'doctor', 'medic'];
            nm.forEach(r => {
                if (effects[r]) {
                    let tg = player.affections[r];
                    if (tg) {
                        tg.target = Math.max(0, Math.min(tg.max, tg.target + effects[r])); 
                        let st = tg.target >= 90 ? "★特殊羈絆" : (tg.target >= 60 ? "信任" : (tg.target >= 30 ? "熟悉" : "陌生"));
                        tg.status = st;
                        let color = effects[r] >= 0 ? tg.color : "#e74c3c";
                        floatingTexts.push(new FloatingText(cw/2, offsetY, `${tg.name} ${effects[r]>=0?'+':''}${effects[r]}`, color));
                        offsetY -= 40;
                        if(effects[r] > 0) hasPositive = true; else hasNegative = true;
                    }
                }
            });
        }
        if (hasPositive) { bloomIntensity = 0.8; bloomColor = '255,230,180'; } 
        if (hasNegative) { cameraShake.amount = 10; bloomIntensity = 0.4; bloomColor = '255,100,100'; }
    }

    function drawPremiumPanel(ctx, x, y, w, h) {

        ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.fill(); ctx.shadowBlur = 0;
        
        let bGrad = ctx.createLinearGradient(x, y, x, y+h);

        ctx.strokeStyle = bGrad; ctx.lineWidth = 1.5; ctx.stroke();
        
        // 內圈裝飾線
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)'; ctx.beginPath(); ctx.roundRect(x+4, y+4, w-8, h-8, 5); ctx.stroke();
        
        // 角落金屬裝飾
        ctx.fillStyle = 'rgba(212, 175, 55, 0.6)';
        ctx.fillRect(x+6, y+6, 15, 2); ctx.fillRect(x+6, y+6, 2, 15);

        ctx.fillRect(x+6, y+h-8, 15, 2); ctx.fillRect(x+6, y+h-21, 2, 15);
        ctx.fillRect(x+w-21, y+h-8, 15, 2); ctx.fillRect(x+w-8, y+h-21, 2, 15);
        ctx.restore();
    }

    function wrapText(ctx, text, maxWidth) {
        let words = text.split(''); let lines = []; let currentLine = '';
        for (let i = 0; i < words.length; i++) {
            let char = words[i];
            if (char === '\n') { lines.push(currentLine); currentLine = ''; continue; }
            let testLine = currentLine + char;
            let metrics = ctx.measureText(testLine);
            if (metrics.width > maxWidth && currentLine !== '') { lines.push(currentLine); currentLine = char; } 
            else { currentLine = testLine; }
        }
        if (currentLine) lines.push(currentLine);
        return lines;
    }

    function drawButton(ctx, id, btn, text) {
        let hover = (mouse.x >= btn.x && mouse.x <= btn.x + btn.w && mouse.y >= btn.y && mouse.y <= btn.y + btn.h);
        let scale = hover ? (mouse.isDown ? 0.96 : 1.01) : 1;
        if (hover) canvas.style.cursor = 'pointer';

        ctx.save(); ctx.translate(btn.x + btn.w/2, btn.y + btn.h/2); ctx.scale(scale, scale);
        let bgGrad = ctx.createLinearGradient(0, -btn.h/2, 0, btn.h/2);
        if (hover) {
            bgGrad.addColorStop(0, 'rgba(212, 175, 55, 0.5)'); bgGrad.addColorStop(1, 'rgba(150, 110, 20, 0.3)');
            ctx.shadowColor = 'rgba(212, 175, 55, 0.5)'; ctx.shadowBlur = 10; 
        } else {
            bgGrad.addColorStop(0, 'rgba(30, 35, 45, 0.95)'); bgGrad.addColorStop(1, 'rgba(15, 18, 25, 0.95)');
        }
        ctx.fillStyle = bgGrad; ctx.beginPath(); ctx.roundRect(-btn.w/2, -btn.h/2, btn.w, btn.h, 4); ctx.fill();
        ctx.strokeStyle = hover ? '#fff' : '#8e793e'; ctx.lineWidth = hover ? 1.5 : 1; ctx.stroke();
        
        ctx.fillStyle = hover ? '#fff' : '#d4af37'; ctx.font = `20px ${FONT_FAMILY}`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        let lines = wrapText(ctx, text, btn.w - 20);
        let startY = -((lines.length - 1) * 12);
        lines.forEach((l, i) => { ctx.fillText(l, 0, startY + i * 24); });
        ctx.restore();
        clickZones.push({ id: id, ...btn });
    }

    function renderDialog(ctx, titleText, contentText, options = null) {
        let padding = 35; let boxW = Math.min(850, cw - 40); let boxX = cw / 2 - boxW / 2;

        let contentLines = wrapText(ctx, contentText, boxW - padding * 2);

        let btnHs = []; let totalBtnH = 0;

        if (options) {
            ctx.font = `20px ${FONT_FAMILY}`;
            btnHs = options.map(opt => wrapText(ctx, opt.text, boxW - padding * 2 - 30).length * 24 + 30);
            totalBtnH = btnHs.reduce((a,b)=>a+b, 0) + (options.length) * 15;
        }

        let boxH = padding * 2 + contentH + (options ? totalBtnH + 15 : 35);
        let boxY = ch - boxH - (isCinematic ? 60 : 30);

        drawPremiumPanel(ctx, boxX, boxY, boxW, boxH);

        if (titleText) {
            ctx.save(); ctx.font = `bold 24px ${FONT_FAMILY}`;
            let tW = ctx.measureText(titleText).width + 60; let tH = 44; let tX = boxX + 25; let tY = boxY - tH / 2; 
            let tGrad = ctx.createLinearGradient(tX, tY, tX, tY+tH);

            ctx.shadowBlur = 0; ctx.fillStyle = '#111'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(titleText, tX + tW / 2, tY + tH / 2);

        ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 3;

            ctx.fillStyle = (line.includes("【") || line.includes("】")) ? '#d4af37' : '#f0f0f0';

            currY += 36;
        });
        ctx.shadowBlur = 0;

        if (options) {

            ctx.fillText("◇ 點擊繼續 ◇", boxX + boxW - 25, boxY + boxH - 20);
            ctx.globalAlpha = 1.0;
            clickZones.push({ id: 'screen_next', x: 0, y: 0, w: cw, h: ch });
        }
    }

    // --- 高階古風場景渲染 ---

        let grad = ctx.createLinearGradient(0, 0, 0, ch);
        
        // 渲染基礎環境光
        if (loc.includes('臥房') || loc.includes('正房')) {
            grad.addColorStop(0, '#2b1d22'); grad.addColorStop(1, '#1a1114'); // 暖紫檀木色

            ctx.fillStyle = grad; ctx.fillRect(0, 0, cw, ch);
            // 朦朧遠月/日光

            ctx.beginPath(); ctx.arc(cw*0.8, ch*0.3, Math.min(cw,ch)*0.15, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            // 竹影婆娑

            ctx.beginPath(); ctx.moveTo(0, ch); ctx.lineTo(0, ch*0.5); ctx.quadraticCurveTo(cw*0.3, ch*0.3, cw*0.6, ch*0.8);

        } else if (loc.includes('膳房') || loc.includes('廚房')) {
            grad.addColorStop(0, '#2a1a10'); grad.addColorStop(1, '#150d05'); // 赭石色
            ctx.fillStyle = grad; ctx.fillRect(0, 0, cw, ch);
            // 爐火暖光
            let fire = ctx.createRadialGradient(cw*0.5, ch, 0, cw*0.5, ch, ch*0.9);
            fire.addColorStop(0, 'rgba(230, 80, 20, 0.2)'); fire.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = fire; ctx.fillRect(0, 0, cw, ch);
        } else if (loc.includes('太醫院') || loc.includes('書閣')) {
            grad.addColorStop(0, '#152020'); grad.addColorStop(1, '#0a1010'); // 玄青色
            ctx.fillStyle = grad; ctx.fillRect(0, 0, cw, ch);
            // 藥櫃線條
            ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 3;
            for(let i=0; i<8; i++) {
                for(let j=0; j<15; j++) { ctx.strokeRect(cw*0.1 + j*cw*0.05, ch*0.2 + i*ch*0.08, cw*0.05, ch*0.08); }
            }
        } else if (loc.includes('夜晚')) {
            grad.addColorStop(0, '#0a0d1a'); grad.addColorStop(1, '#05070d'); // 幽夜藍
            ctx.fillStyle = grad; ctx.fillRect(0, 0, cw, ch);
            // 冷月光
            ctx.fillStyle = 'rgba(180, 200, 255, 0.5)'; ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 60;
            ctx.beginPath(); ctx.arc(cw*0.2, ch*0.2, Math.min(cw,ch)*0.1, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
        } else {
            grad.addColorStop(0, '#1a1a24'); grad.addColorStop(1, '#08080c');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, cw, ch);
        }

        // 渲染環境粒子
        if (particles.length === 0 || Math.random() < 0.01) updateWeather(weather);
        ctx.globalCompositeOperation = 'screen';
        particles.forEach(p => { p.update(dt); p.draw(ctx); });
        ctx.globalCompositeOperation = 'source-over';
    }

    // --- 主遊戲迴圈 ---
    function gameLoop(timestamp) {
        if (!timestamp) timestamp = performance.now();
        if (!lastTime) lastTime = timestamp;
        dt = (timestamp - lastTime) / 1000 || 0;
        if (dt > 0.1) dt = 0.016; 
        lastTime = timestamp; time += dt;
        if (isNaN(time)) time = 0;

        mouse.x += (mouse.targetX - mouse.x) * 10 * dt; mouse.y += (mouse.targetY - mouse.y) * 10 * dt;
        
        // 攝影機震動
        if (cameraShake.amount > 0.1) {
            cameraShake.x = (Math.random() - 0.5) * cameraShake.amount; cameraShake.y = (Math.random() - 0.5) * cameraShake.amount;
            cameraShake.amount *= 0.85;
        } else { cameraShake.x = 0; cameraShake.y = 0; }

        // CG 模式平滑過渡
        cinematicLerp += ((isCinematic ? 1 : 0) - cinematicLerp) * dt * 3;

        ctx.save();
        ctx.scale(dpr, dpr); 
        ctx.translate(cameraShake.x, cameraShake.y);

        // 狀態轉場漸變
        if (currentState === STATES.DAY_TRANSITION || currentState === STATES.START || currentState === STATES.END || currentState === STATES.LOADING) {
            globalAlpha += (1 - globalAlpha) * dt * 2;
        } else { globalAlpha = 1; }
        ctx.globalAlpha = isNaN(globalAlpha) ? 1 : globalAlpha;

        drawSceneBackground(ctx);

        // 角色更新與渲染
        mainCharacter.update(dt);
        Object.values(npcs).forEach(npc => npc.update(dt));
        
        let activeChar = mainCharacter;
        if (currentState !== STATES.LOADING) {
            if (currentState === STATES.STORY || currentState === STATES.QUESTION || currentState === STATES.FEEDBACK) {
                let stage = currentStage || introStage; let charName = stage.character || "";
                if (charName.includes("春桃")) activeChar = npcs.maid;
                else if (charName.includes("總管")) activeChar = npcs.chef;
                else if (charName.includes("太醫") || charName.includes("張")) activeChar = npcs.doctor;
                else if (charName.includes("蘇氏") || charName.includes("醫女")) activeChar = npcs.medic;
            }
            if (currentState !== STATES.DAY_TRANSITION && currentState !== STATES.START && currentState !== STATES.END && currentState !== STATES.LOADING) {
                // CG 模式下拉近鏡頭
                let charScale = Math.max(1.0, Math.min(cw/600, ch/800) * 2.2) + (cinematicLerp * 0.8);
                let charY = ch/2 + 100 + (cinematicLerp * 150);
                activeChar.draw(ctx, cw/2, charY, charScale);
            }
        }

        // 繪製電影級黑邊 (CG 模式)
        if (cinematicLerp > 0.01) {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, cw, ch * 0.12 * cinematicLerp); // 上黑邊
            ctx.fillRect(0, ch - (ch * 0.12 * cinematicLerp), cw, ch * 0.12 * cinematicLerp); // 下黑邊
            // 強光濾鏡
            ctx.globalCompositeOperation = 'screen';
            ctx.fillStyle = `rgba(255, 230, 180, ${cinematicLerp * 0.15})`;
            ctx.fillRect(0,0,cw,ch);
            ctx.globalCompositeOperation = 'source-over';
        }

        clickZones = [];
        canvas.style.cursor = 'crosshair'; 

        // 狀態 UI 渲染
        if (currentState === STATES.LOADING) {
             ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(0,0,cw,ch);
             ctx.textAlign = 'center'; ctx.fillStyle = '#d4af37'; ctx.font = `bold 28px ${FONT_FAMILY}`; 
             ctx.fillText("研讀卷宗中...", cw/2, ch/2);
        }
        else if (currentState === STATES.START) {
            ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0,0,cw,ch);
            ctx.textAlign = 'center'; ctx.shadowColor = '#d4af37'; ctx.shadowBlur = 30;
            ctx.fillStyle = '#fff'; let titleSize = Math.max(35, Math.min(70, cw * 0.08));
            ctx.font = `bold ${titleSize}px ${FONT_FAMILY}`; ctx.fillText("汴京娘子調養記", cw/2, ch/2 - 110); ctx.shadowBlur = 0;
            ctx.fillStyle = '#d4af37'; ctx.font = `${titleSize*0.4}px ${FONT_FAMILY}`; ctx.fillText("◇ 沉浸式人生養成 ◇", cw/2, ch/2 - 40);
            drawButton(ctx, 'btn_start', {x: cw/2 - 110, y: ch/2 + 80, w: 220, h: 65}, "踏入侯府");
        }
        else if (currentState === STATES.DAY_TRANSITION) {
            ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,cw,ch);
            let dayInfo = daysData[Math.min(currentDay - 1, daysData.length - 1)];
            ctx.textAlign = 'center'; ctx.shadowColor = '#d4af37'; ctx.shadowBlur = 15;
            ctx.fillStyle = '#d4af37'; ctx.font = `bold 48px ${FONT_FAMILY}`; 
            ctx.fillText(dayInfo.day, cw/2, ch/2 - 80); ctx.shadowBlur = 0;
            ctx.fillStyle = '#e0e0e0'; ctx.font = `24px ${FONT_FAMILY}`;
            let lines = wrapText(ctx, dayInfo.event, Math.min(650, cw - 60));
            lines.forEach((l, i) => ctx.fillText(l, cw/2, ch/2 - 10 + i*38));
            ctx.globalAlpha = (Math.sin(time * 3) + 1) * 0.5 * globalAlpha;
            ctx.fillStyle = '#d4af37'; ctx.font = `bold 20px ${FONT_FAMILY}`; ctx.fillText("◇ 點擊開啟今日日程 ◇", cw/2, ch/2 + 150);
            ctx.globalAlpha = globalAlpha;
            clickZones.push({ id: 'screen_next_day', x: 0, y: 0, w: cw, h: ch });
        }
        else if (currentState === STATES.STORY) {
            drawDatePanel(ctx); drawStatsPanel(ctx);
            renderDialog(ctx, currentStage.character, currentStage.story[currentStoryLine], null);
        }
        else if (currentState === STATES.QUESTION) {
            drawDatePanel(ctx); drawStatsPanel(ctx);
            renderDialog(ctx, currentStage.character || "內心抉擇", currentStage.question, currentStage.options);
        }
        else if (currentState === STATES.FEEDBACK) {
            drawDatePanel(ctx); drawStatsPanel(ctx);
            renderDialog(ctx, "選擇之果", selectedOptionFeedback, null);
        }
        else if (currentState === STATES.END) {
            ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(0,0,cw,ch);
            ctx.textAlign = 'center'; 
            ctx.fillStyle = currentEnding.color; ctx.font = `bold 52px ${FONT_FAMILY}`; ctx.fillText(currentEnding.title, cw/2, ch/2 - 130);
            ctx.fillStyle = '#eaeaea'; ctx.font = `24px ${FONT_FAMILY}`; 
            let endLines = wrapText(ctx, currentEnding.desc, Math.min(750, cw - 60));
            endLines.forEach((l, i) => ctx.fillText(l, cw/2, ch/2 - 40 + i*40));
            
            drawButton(ctx, 'btn_restart', {x: cw/2 - 240, y: ch/2 + 130, w: 220, h: 65}, "重啟人生");
            drawButton(ctx, 'btn_home', {x: cw/2 + 20, y: ch/2 + 130, w: 220, h: 65}, "返回首頁");
        }

        floatingTexts = floatingTexts.filter(t => t.life > 0); floatingTexts.forEach(t => { t.update(); t.draw(ctx); });

        if (bloomIntensity > 0) {
            ctx.globalCompositeOperation = 'screen'; ctx.fillStyle = `rgba(${bloomColor}, ${bloomIntensity * 0.35})`;
            ctx.fillRect(0, 0, cw, ch); bloomIntensity -= dt * 2.5; ctx.globalCompositeOperation = 'source-over';
        }

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    function handleInteraction(cx, cy) {
        let clicked = clickZones.find(z => cx >= z.x && cx <= z.x + z.w && cy >= z.y && cy <= z.y + z.h);
        
        if (currentState === STATES.START && clicked && clicked.id === 'btn_start') {
            resetPools(); currentDay = 1; globalAlpha = 0; 
            currentStage = introStage; mainCharacter.setEmotion('normal'); currentState = STATES.STORY;
        }
        else if (currentState === STATES.DAY_TRANSITION && clicked && clicked.id === 'screen_next_day') {
            let dayData = daysData[currentDay - 1]; let role = dayData.role;
            if (activePools[role] && activePools[role].length > 0) currentStage = activePools[role].pop();
            else currentStage = fallbackQuestions[0]; // 極端情況防呆
            currentStage.location = dayData.location; mainCharacter.reset(); currentStoryLine = 0; currentState = STATES.STORY;
        }
        else if (currentState === STATES.STORY && clicked && clicked.id === 'screen_next') {
            currentStoryLine++; if (currentStoryLine >= currentStage.story.length) currentState = STATES.QUESTION;
        }
        else if (currentState === STATES.QUESTION && clicked && clicked.id.startsWith('opt_')) {
            let idx = parseInt(clicked.id.split('_')[1]); applyChoice(currentStage.options[idx]);
        }
        else if (currentState === STATES.FEEDBACK && clicked && clicked.id === 'screen_next') {
            isCinematic = false; // 解除 CG 模式
            if (currentStage === introStage) { currentState = STATES.DAY_TRANSITION; } 
            else {
                currentDay++; currentStoryLine = 0;
                if (currentDay > 7) { currentEnding = determineEnding(); globalAlpha = 0; currentState = STATES.END; mainCharacter.setEmotion('happy'); } 
                else { globalAlpha = 0; currentState = STATES.DAY_TRANSITION; }
            }
        }
        else if (currentState === STATES.END && clicked && clicked.id === 'btn_restart') {
            currentDay = 1; player.knowledge = 50; player.health = 60; player.reputation = 50; player.bond = 50;
            player.routes = { virtue: 0, power: 0, medical: 0, family: 0 };
            resetPools(); for(let key in player.affections) { player.affections[key].target = 20; player.affections[key].current = 20; player.affections[key].status = "陌生"; }
            globalAlpha = 0; currentStage = introStage; mainCharacter.setEmotion('normal'); currentState = STATES.STORY;
        }
        else if (currentState === STATES.END && clicked && clicked.id === 'btn_home') {
            window.location.reload(); 
        }
    }

    canvas.addEventListener('mousedown', e => { mouse.isDown = true; });
    canvas.addEventListener('mouseup', e => { mouse.isDown = false; if (currentState !== STATES.LOADING) handleInteraction((e.clientX - canvas.getBoundingClientRect().left) * (cw / canvas.getBoundingClientRect().width), (e.clientY - canvas.getBoundingClientRect().top) * (ch / canvas.getBoundingClientRect().height)); });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); mouse.isDown = true; let rect = canvas.getBoundingClientRect(); mouse.targetX = (e.touches[0].clientX - rect.left) * (cw / rect.width); mouse.targetY = (e.touches[0].clientY - rect.top) * (ch / rect.height); }, {passive: false});
    canvas.addEventListener('touchend', e => { mouse.isDown = false; if (currentState !== STATES.LOADING) handleInteraction(mouse.targetX, mouse.targetY); });

    loadQuestions(); requestAnimationFrame(gameLoop);
</script>
</body>
