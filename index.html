<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汴京娘子調養記 - 產科衛教專業版</title>
    <style>
        :root {
            --gold: #d4af37;
            --gold-dark: #aa8620;
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(18, 18, 20, 0.95);
            --red-accent: #8b1e28;
            --text-main: #f0ebd8;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Kaiti', '標楷體', 'Times New Roman', serif;
            overflow: hidden; 
            color: var(--text-main);
            user-select: none; -webkit-user-select: none;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }
        #game-container {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        canvas {
            display: block; width: 100%; height: 100%;
            cursor: crosshair; touch-action: none;
            z-index: 1;
        }
        
        #sys-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            z-index: 100; display: none; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .menu-panel {
            width: 90%; max-width: 800px; max-height: 80vh;
            background: var(--panel-bg);
            border: 2px solid var(--gold); border-radius: 8px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            padding: 30px; overflow-y: auto; position: relative;
        }
        .menu-panel::before, .menu-panel::after {
            content: ''; position: absolute; width: 20px; height: 20px; border: 2px solid var(--gold);
        }
        .menu-panel::before { top: 5px; left: 5px; border-right: none; border-bottom: none; }
        .menu-panel::after { bottom: 5px; right: 5px; border-left: none; border-top: none; }
        
        .menu-title {
            text-align: center; font-size: 32px; color: var(--gold);
            margin-bottom: 20px; border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 10px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .sys-btn {
            background: linear-gradient(180deg, rgba(40,30,20,0.9) 0%, rgba(20,15,10,0.9) 100%);
            border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 24px; font-size: 20px; font-family: inherit;
            border-radius: 4px; cursor: pointer; transition: all 0.2s;
            margin: 10px; text-shadow: 1px 1px 2px #000;
        }
        .sys-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }
        .close-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--gold); font-size: 28px; cursor: pointer; }
        
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;
        }
        .achievement-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 15px; border-radius: 6px; text-align: center;
        }
        .achievement-card.locked { opacity: 0.5; filter: grayscale(100%); }
        .achievement-card h3 { color: var(--gold); margin: 0 0 10px 0; font-size: 20px; }
        .achievement-card p { color: #ccc; margin: 0; font-size: 14px; line-height: 1.4; }
        
        #btn-sys-toggle {
            position: absolute; top: 20px; right: 20px; z-index: 50;
            background: rgba(10,10,10,0.8); border: 1px solid var(--gold);
            color: var(--gold); padding: 8px 15px; border-radius: 4px; cursor: pointer;
            font-family: inherit; font-size: 18px; display: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <button id="btn-sys-toggle" onclick="toggleMenu()">☰ 系統選單</button>
    <canvas id="gameCanvas"></canvas>
    
    <div id="sys-menu">
        <div class="menu-panel">
            <button class="close-btn" onclick="toggleMenu()">×</button>
            <div class="menu-title" id="menu-title">系統選單</div>
            
            <div id="menu-main" style="text-align: center;">
                <button class="sys-btn" onclick="saveGame()">儲存進度</button>
                <button class="sys-btn" onclick="loadGame()">讀取進度</button>
                <button class="sys-btn" onclick="showGallery()">衛教結業圖鑑</button>
                <button class="sys-btn" onclick="showAchievements()">光輝成就</button>
                <button class="sys-btn" style="border-color: #8b1e28; color: #ffcccc;" onclick="window.location.reload()">回到標題</button>
            </div>
            
            <div id="menu-gallery" style="display: none;">
                <div class="grid-container" id="gallery-grid"></div>
                <div style="text-align:center; margin-top:20px;"><button class="sys-btn" onclick="backToMenuMain()">返回</button></div>
            </div>
            
            <div id="menu-achievements" style="display: none;">
                <div class="grid-container" id="achievements-grid"></div>
                <div style="text-align:center; margin-top:20px;"><button class="sys-btn" onclick="backToMenuMain()">返回</button></div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas ? canvas.getContext('2d') : null; 

    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            r = r || 0; this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r); return this;
        };
    }

    const FONT_FAMILY = '"Kaiti", "標楷體", "Times New Roman", serif';
    let dpr = window.devicePixelRatio || 1;
    let cw = window.innerWidth; let ch = window.innerHeight;
    
    function resize() {
        cw = window.innerWidth; ch = window.innerHeight;
        if(canvas) { canvas.width = cw * dpr; canvas.height = ch * dpr; }
    }
    window.addEventListener('resize', resize); resize();

    // =============== 變數宣告與狀態機 ===============
    const STATES = { LOADING: 0, TITLE: 1, DAY_TRANSITION: 2, STORY: 3, QUESTION: 4, FEEDBACK: 5, END: 6, SYSTEM: 7, MODE_SELECT: 8, FREE_MENU: 9 };
    let currentState = STATES.LOADING; 
    
    let gameMode = "tutorial"; // "tutorial" = 七日衛教體驗, "free" = 繼續孕期照護模式
    let currentDay = 1; let currentStage = null; let currentStoryLine = 0;
    let selectedOptionFeedback = "";
    let mouse = { x: cw/2, y: ch/2, targetX: cw/2, targetY: ch/2, isDown: false };
    let time = 0, dt = 0, lastTime = 0;
    let clickZones = []; 
    let cameraShake = { x: 0, y: 0, amount: 0 };
    let globalAlpha = 1; 
    let currentEnding = null; 
    let bloomIntensity = 0; 
    let bloomColor = '212,175,55'; 

    // 新的數值系統：衛教知識, 母體健康, 新生兒健康, 親子連結
    let player = { 
        knowledge: 40, health: 60, babyHealth: 60, bond: 50, 
        routes: { virtue: 0, power: 0, medical: 0, family: 0 }, 
        affections: {
            maid: { name: "丫鬟 春桃", current: 20, target: 20, max: 100, color: "#e86f88", status: "輔助" },
            chef: { name: "膳房 總管", current: 20, target: 20, max: 100, color: "#d29c72", status: "輔助" },
            doctor: { name: "太醫 張大人", current: 20, target: 20, max: 100, color: "#6ca07e", status: "衛教指導" },
            medic: { name: "醫女 蘇氏", current: 20, target: 20, max: 100, color: "#82c0d9", status: "衛教指導" }
        }
    };

    function shuffle(array) {
        let currentIndex = array.length, randomIndex, temp;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            temp = array[currentIndex];
            array[currentIndex] = array[randomIndex];
            array[randomIndex] = temp;
        }
        return array;
    }

    class DustParticle {
        constructor() {
            this.x = Math.random() * cw; this.y = Math.random() * ch;
            this.size = Math.random() * 2 + 0.5;
            this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5 - 0.2;
            this.life = Math.random() * Math.PI * 2;
        }
        update(dt) {
            this.x += this.vx + Math.sin(time + this.life) * 0.5; this.y += this.vy; this.life += dt;
            if (this.y < 0) this.y = ch; if (this.x < 0) this.x = cw; if (this.x > cw) this.x = 0;
        }
        draw(ctx) {
            let alpha = (Math.sin(this.life * 2) + 1) * 0.3;
            ctx.fillStyle = `rgba(212, 175, 55, ${alpha * 0.5})`; 
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }
    let dustParticles = [];
    for (let i = 0; i < 40; i++) dustParticles.push(new DustParticle());

    let globalData = {
        playCount: 0, unlockedEndings: [],
        achievements: {
            'first_blood': { name: "初識醫理", desc: "完成第一天衛教體驗。", unlocked: false },
            'god_hand': { name: "杏林模範", desc: "衛教知識與醫療路線達到最高。", unlocked: false },
            'max_bond': { name: "母嬰同心", desc: "親子連結達到滿值。", unlocked: false }
        }
    };

    function loadGlobalData() {
        try {
            const saved = localStorage.getItem('bianjing_global_edu');
            if (saved) {
                const parsed = JSON.parse(saved);
                globalData.playCount = parsed.playCount || 0;
                globalData.unlockedEndings = parsed.unlockedEndings || [];
                if(parsed.achievements) Object.assign(globalData.achievements, parsed.achievements);
            }
        } catch(e) {}
    }
    function saveGlobalData() { localStorage.setItem('bianjing_global_edu', JSON.stringify(globalData)); }

    function showSysMessage(msg) {
        selectedOptionFeedback = msg;
        let prev = currentState; currentState = STATES.FEEDBACK;
        setTimeout(() => { if(currentState === STATES.FEEDBACK) currentState = prev; }, 1500);
    }

    function saveGame() {
        const saveData = { player, currentDay, currentStage, currentStoryLine, gameMode };
        localStorage.setItem('bianjing_save_edu', JSON.stringify(saveData));
        toggleMenu(); showSysMessage("進度已儲存。");
    }

    function loadGame() {
        try {
            const saved = localStorage.getItem('bianjing_save_edu');
            if(saved) {
                const data = JSON.parse(saved);
                player = data.player; currentDay = data.currentDay; 
                currentStage = data.currentStage; currentStoryLine = data.currentStoryLine;
                if(data.gameMode) gameMode = data.gameMode;
                toggleMenu(); currentState = STATES.STORY; showSysMessage("進度讀取成功。");
            } else { alert("沒有找到存檔紀錄。"); }
        } catch(e) { alert("讀取失敗。"); }
    }

    function checkAchievements() {
        if(currentDay > 1 && !globalData.achievements['first_blood'].unlocked) {
            globalData.achievements['first_blood'].unlocked = true; saveGlobalData(); showSysMessage("解鎖成就：初識醫理");
        }
        if(player.bond >= 90 && !globalData.achievements['max_bond'].unlocked) {
            globalData.achievements['max_bond'].unlocked = true; saveGlobalData(); showSysMessage("解鎖成就：母嬰同心");
        }
    }

    function toggleMenu() {
        const menu = document.getElementById('sys-menu');
        if (menu.style.display === 'flex') {
            menu.style.opacity = 0; setTimeout(() => menu.style.display = 'none', 300);
        } else {
            document.getElementById('menu-main').style.display = 'block';
            document.getElementById('menu-gallery').style.display = 'none';
            document.getElementById('menu-achievements').style.display = 'none';
            document.getElementById('menu-title').innerText = "系統選單";
            menu.style.display = 'flex'; setTimeout(() => menu.style.opacity = 1, 10);
        }
    }
    function backToMenuMain() {
        document.getElementById('menu-main').style.display = 'block';
        document.getElementById('menu-gallery').style.display = 'none';
        document.getElementById('menu-achievements').style.display = 'none';
        document.getElementById('menu-title').innerText = "系統選單";
    }
    function showGallery() {
        document.getElementById('menu-main').style.display = 'none';
        document.getElementById('menu-gallery').style.display = 'block';
        document.getElementById('menu-title').innerText = "衛教結業圖鑑";
        
        const grid = document.getElementById('gallery-grid'); grid.innerHTML = '';
        const allEndings = [
            { id: '【全能守護母嬰】', desc: "完美結業。知識、健康與連結皆達頂峰。" },
            { id: '【杏林衛教大使】', desc: "醫術路線。您已具備極高的產科護理知識。" },
            { id: '【親情無限羈絆】', desc: "親情路線。母子連心，新生兒健康優良。" },
            { id: '【侯府健康管理者】', desc: "管理路線。成功調度資源，確保產褥期順利。" },
            { id: '【知識匱乏的風險】', desc: "未達標結業。知識不足導致母嬰健康出現隱患。" }
        ];
        allEndings.forEach(end => {
            const isUnlocked = globalData.unlockedEndings.includes(end.id);
            grid.innerHTML += `<div class="achievement-card ${isUnlocked ? '' : 'locked'}">
                <h3>${isUnlocked ? end.id : '？？？'}</h3>
                <p>${isUnlocked ? end.desc : '尚未達成此結業目標。'}</p></div>`;
        });
    }
    function showAchievements() {
        document.getElementById('menu-main').style.display = 'none';
        document.getElementById('menu-achievements').style.display = 'block';
        document.getElementById('menu-title').innerText = "光輝成就";
        const grid = document.getElementById('achievements-grid'); grid.innerHTML = '';
        for(let key in globalData.achievements) {
            let ach = globalData.achievements[key];
            grid.innerHTML += `<div class="achievement-card ${ach.unlocked ? '' : 'locked'}">
                <h3>${ach.name}</h3><p>${ach.unlocked ? ach.desc : '未達成'}</p></div>`;
        }
    }

    // 產後七日衛教主線 (以醫療角色為核心)
    const daysData = [
        { day: "產後第一天", weather: "sunny", location: "侯府臥房", role: "medic", event: "初為人母，產後首重觀察生命徵象與子宮收縮。醫女蘇氏前來為您進行首次產後護理指導。" },
        { day: "產後第二天", weather: "cloudy", location: "太醫院", role: "doctor", event: "產後第二天，太醫前來查房，重點關注惡露的排出與會陰傷口的照護狀況。" },
        { day: "產後第三天", weather: "rainy", location: "侯府臥房", role: "medic", event: "乳汁開始分泌，乳房可能出現脹痛。醫女蘇氏將指導您正確的母乳哺育與含乳姿勢。" },
        { day: "產後第四天", weather: "snowy", location: "庭院", role: "medic", event: "新生兒的生理性黃疸可能在此時出現，需要密切觀察寶寶的膚色、活動力與排泄狀況。" },
        { day: "產後第五天", weather: "sunny", location: "廚房", role: "chef", event: "產褥期飲食需兼顧母體恢復與泌乳。膳房總管在太醫指導下，前來與您確認營養攝取原則。" },
        { day: "產後第六天", weather: "cloudy", location: "夜晚侯府", role: "medic", event: "夜間哺育易引發產婦疲勞與情緒低落。醫女前來關心您的心理健康與睡眠品質。" },
        { day: "產後第七天", weather: "sunny", location: "太醫院", role: "doctor", event: "產後滿一週，太醫為您進行階段性總結評估，確認子宮復舊進度與母嬰整體健康。" }
    ];

    // =============== 大量產科衛教題庫 (超過50題，涵蓋孕產各階段) ===============
    const obstetricEducationQuestions = [
        // 孕期
        { category:"孕期營養", question:"孕期為預防胎兒神經管缺損，最需要補充哪種營養素？", options:["維生素C","葉酸","鈣質","鐵質"], answer:1, explanation:"葉酸對胎兒早期神經管發育至關重要，建議孕前及孕早期補充。" },
        { category:"孕期營養", question:"孕婦若有貧血現象，補充鐵劑時建議搭配何種飲品以促進吸收？", options:["牛奶","熱茶","柳橙汁(含維生素C)","咖啡"], answer:2, explanation:"維生素C能促進腸道對鐵質的吸收，而茶與咖啡中的單寧酸會阻礙吸收。" },
        { category:"產前檢查", question:"妊娠糖尿病的常規篩檢通常安排在懷孕第幾週？", options:["10-12週","16-20週","24-28週","32-36週"], answer:2, explanation:"多數孕婦在24至28週時進行口服葡萄糖耐受測試(OGTT)。" },
        { category:"產前檢查", question:"孕婦進行超音波檢查測量「頸部透明帶」主要為了篩檢何種疾病？", options:["地中海貧血","唐氏症","妊娠高血壓","巨嬰症"], answer:1, explanation:"第一孕期唐氏症篩檢會結合超音波測量胎兒頸部透明帶厚度及母體血清檢驗。" },
        { category:"胎動觀察", question:"初產婦通常在懷孕幾週時開始感覺到初次胎動？", options:["10-12週","18-20週","26-28週","34週以後"], answer:1, explanation:"初產婦約在18-20週感覺到胎動，經產婦則可能提早至16週。" },
        { category:"妊娠不適", question:"懷孕後期孕婦仰臥時容易出現頭暈、血壓下降，這是因為？", options:["缺氧","增大的子宮壓迫下腔靜脈","血糖過低","子宮收縮"], answer:1, explanation:"仰臥性低血壓症候群肇因於下腔靜脈受壓迫，建議孕婦採取左側臥姿以改善血液回流。" },
        { category:"妊娠不適", question:"為減輕懷孕初期的孕吐不適，下列哪項衛教建議最合適？", options:["完全禁食","多吃流質且高油脂的熱湯","少量多餐，早晨起床吃些乾餅乾","劇烈運動促進消化"], answer:2, explanation:"少量多餐、避免空腹、攝取乾性醣類（如蘇打餅）有助於緩解晨吐。" },
        { category:"妊娠併發症", question:"妊娠毒血症（子癇前症）的典型三大症狀為何？", options:["高血壓、蛋白尿、全身性水腫","低血壓、頻尿、抽筋","發燒、咳嗽、破水","心悸、手抖、失眠"], answer:0, explanation:"子癇前症好發於懷孕20週後，特徵為高血壓合併蛋白尿，且常伴隨病理性水腫。" },
        
        // 生產
        { category:"生產徵兆", question:"真正的陣痛（True Labor）具備哪種特徵？", options:["疼痛僅限於下腹部","休息或走動後疼痛會減輕","陣痛頻率變規律，間隔縮短且強度增加","不會導致子宮頸擴張"], answer:2, explanation:"真陣痛具備規律性、強度增加且無法藉由休息緩解，並伴隨子宮頸擴張與變薄。" },

    // 動態將衛教題庫轉換為 RPG 選項格式，由專業醫療 NPC 發問
    function generateEduQuestion(raw) {
        // 大幅增加太醫與醫女的比例
        const roles = [
            { c: "太醫 張大人", pool: "doctor" }, { c: "太醫 張大人", pool: "doctor" },
            { c: "醫女 蘇氏", pool: "medic" }, { c: "醫女 蘇氏", pool: "medic" },
            { c: "丫鬟 春桃", pool: "maid" }, { c: "膳房 總管", pool: "chef" }
        ];
        let roleObj = roles[Math.floor(Math.random() * roles.length)];
        
        let mappedOptions = raw.options.map((optText, idx) => {
            let isCorrect = (idx === raw.answer);
            return {
                text: optText,
                feedback: (isCorrect ? "【理解正確】\n" : "【觀念釐清】\n") + raw.explanation,
                expr: isCorrect ? "happy" : "shocked",
                // 修改數值系統，增加知識與新生兒健康
                effects: isCorrect ? { knowledge: 10, babyHealth: 5, medical: 5 } : { knowledge: 5, babyHealth: -5 } 
            };
        });

        mappedOptions = shuffle(mappedOptions);

        return {
            category: raw.category,
            character: roleObj.c,
            location: ['侯府臥房','太醫院','庭院'][Math.floor(Math.random()*3)],
            story: ["「夫人，關於『" + raw.category + "』的護理重點，微臣/奴婢想與您確認一下觀念。」", "（請選擇最符合現代產科衛教標準的處置方式）"],
            question: raw.question,
            options: mappedOptions
        };
    }

    class ProceduralLive2DCharacter {
        constructor(role, customColors = null) {
            this.role = role; 
            this.bPhase = Math.random() * Math.PI; this.hPhase = Math.random() * Math.PI;
            this.blink = Math.random() * 3; this.eyeOpen = 1;
            this.targetExpr = { smile: 0, brow: 0, eye: 1.0 }; this.currExpr = { smile: 0, brow: 0, eye: 1.0 };
            this.scale = 0; this.y = 100;
            
            this.colors = customColors || {
                skinBase: '#fae3d9', skinShadow: '#d9a896', skinHigh: '#fff1ec',
                hairDark: '#0a0b10', hairLight: '#2c2f3f',
                silkBase: '#8b1e28', silkShadow: '#4a0e14', goldTrim: '#d4af37'
            };
        }

        setEmotion(type) {
            switch(type) {
                case 'happy': this.targetExpr = { smile: 1.2, brow: 0.3, eye: 0.9 }; break;
                case 'shocked': this.targetExpr = { smile: -0.3, brow: 0.6, eye: 1.3 }; break;
                case 'angry': this.targetExpr = { smile: -0.6, brow: -0.7, eye: 0.9 }; break;
                default: this.targetExpr = { smile: 0.2, brow: 0, eye: 1.0 }; break;
            }
        }

        update(dt) {
            let spd = this.role === 'chef' ? 1.0 : 1.5;
            if (this.currExpr.smile < -0.3) spd *= 1.5; 
            this.bPhase += dt * spd; this.hPhase += dt * 2.0;

            this.blink -= dt;
            if (this.blink <= 0) { this.eyeOpen -= dt * 15; if (this.eyeOpen <= 0) { this.eyeOpen = 0; this.blink = Math.random() * 3 + 2; } } 
            else { this.eyeOpen += dt * 10; if (this.eyeOpen > 1) this.eyeOpen = 1; }

            this.currExpr.smile += (this.targetExpr.smile - this.currExpr.smile) * dt * 5;
            this.currExpr.brow += (this.targetExpr.brow - this.currExpr.brow) * dt * 5;
            this.currExpr.eye += (this.targetExpr.eye - this.currExpr.eye) * dt * 5;
            this.scale += (1 - this.scale) * dt * 8; this.y += (0 - this.y) * dt * 8;
        }

        reset() { this.scale = 0.5; this.y = 50; }
        resetAppearance() { this.reset(); this.setEmotion('normal'); }

        draw(ctx, cx, cy, scale, isMini = false) {
            ctx.save(); ctx.translate(cx, cy + (isMini ? 0 : this.y)); ctx.scale(scale * (isMini ? 1 : this.scale), scale * (isMini ? 1 : this.scale));
            let bY = Math.sin(this.bPhase) * 3; let bS = 1 + Math.sin(this.bPhase) * 0.005;
            let swayX = Math.sin(this.hPhase) * 4; let swayY = Math.cos(this.hPhase * 0.8) * 2;
            let lookX = isMini ? 0 : (mouse.x - cx) * 0.015; let lookY = isMini ? 0 : (mouse.y - cy) * 0.015;

            this.drawHairB(ctx, swayX, swayY);
            ctx.save(); ctx.translate(lookX * 0.5, bY); ctx.scale(1, bS); this.drawBody(ctx, isMini); ctx.restore();
            ctx.save(); ctx.translate(lookX, lookY + bY * 0.5); this.drawFace(ctx, isMini);
            ctx.save(); ctx.translate(lookX * 0.3, lookY * 0.3); this.drawFeatures(ctx); ctx.restore();
            this.drawHairF(ctx, swayX, swayY); ctx.restore();
            if (!isMini) this.drawLighting(ctx, cx, cy);
            ctx.restore();
        }

        drawBody(ctx, isMini) {
            let silk = ctx.createLinearGradient(0, 0, 0, 300); silk.addColorStop(0, this.colors.silkBase); silk.addColorStop(1, this.colors.silkShadow);
            ctx.fillStyle = silk; ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = isMini ? 0 : 15;
            ctx.beginPath();
            if (this.role === 'chef') { ctx.moveTo(-170, 300); ctx.quadraticCurveTo(-120, 80, -40, 80); ctx.lineTo(40, 80); ctx.quadraticCurveTo(120, 80, 170, 300); } 
            else if (this.role === 'doctor') { ctx.moveTo(-140, 300); ctx.lineTo(-90, 80); ctx.lineTo(90, 80); ctx.lineTo(140, 300); } 
            else { ctx.moveTo(-130, 300); ctx.quadraticCurveTo(-90, 80, -30, 80); ctx.lineTo(30, 80); ctx.quadraticCurveTo(90, 80, 130, 300); }
            ctx.fill(); ctx.shadowBlur = 0;

            let col = ctx.createLinearGradient(-50, 80, 50, 150); col.addColorStop(0, '#e6e6e6'); col.addColorStop(1, '#b3b3b3');

    function applyEffects(effects) {
        let offsetY = ch/2 - 100; let hasPos = false; let hasNeg = false;
        if (effects) {
            const sm = { 'knowledge': '衛教知識', 'health': '母體健康', 'babyHealth': '嬰兒健康', 'bond': '親子連結', 'virtue': '賢德', 'power': '權謀', 'medical': '醫術', 'family': '親情' };
            for (let key in sm) {
                if (effects[key]) {
                    if (['virtue', 'power', 'medical', 'family'].includes(key)) player.routes[key] += effects[key];
                    else player[key] = Math.max(0, Math.min(100, player[key] + effects[key]));
                    let color = effects[key] >= 0 ? '#4caf50' : '#e74c3c';
                    floatingTexts.push(new FloatingText(cw/2, offsetY, `${sm[key]} ${effects[key]>=0?'+':''}${effects[key]}`, color));
                    offsetY -= 40; if(effects[key]>0) hasPos=true; else hasNeg=true;
                }
            }
            const nm = ['maid', 'chef', 'doctor', 'medic'];
            nm.forEach(role => {
                if (effects[role]) {
                    let tc = player.affections[role];
                    if (tc) {
                        tc.target = Math.max(0, Math.min(tc.max, tc.target + effects[role])); 
                        let tgt = tc.target;
                        if(tgt >= 90) tc.status = "★主僕同心"; else if(tgt >= 60) tc.status = "忠誠信任"; else if(tgt >= 30) tc.status = "親近熟悉"; else tc.status = "恭敬守禮";
                        let color = effects[role] >= 0 ? tc.color : "#e74c3c";
                        floatingTexts.push(new FloatingText(cw/2, offsetY, `${tc.name} ${effects[role]>=0?'+':''}${effects[role]}`, color));
                        offsetY -= 40; if(effects[role]>0) hasPos=true; else hasNeg=true;
                    }
                }
            });
        }
        if (hasPos) { bloomIntensity = 1.0; bloomColor = '212,175,55'; } 
        if (hasNeg) { cameraShake.amount = 12; bloomIntensity = 0.5; bloomColor = '139,30,40'; }
        checkAchievements();

    function drawButton(ctx, id, btn, text, isLocked = false) {
        let hover = (!isLocked && mouse.x >= btn.x && mouse.x <= btn.x + btn.w && mouse.y >= btn.y && mouse.y <= btn.y + btn.h);
        let scale = hover ? (mouse.isDown ? 0.96 : 1.01) : 1;
        if (hover) canvas.style.cursor = 'pointer';

        ctx.save(); ctx.translate(btn.x + btn.w/2, btn.y + btn.h/2); ctx.scale(scale, scale);
        
        let bg = ctx.createLinearGradient(0, -btn.h/2, 0, btn.h/2);
        if (isLocked) { bg.addColorStop(0, 'rgba(40, 40, 40, 0.9)'); bg.addColorStop(1, 'rgba(20, 20, 20, 0.9)'); }
        else if (hover) { bg.addColorStop(0, 'rgba(212, 175, 55, 0.5)'); bg.addColorStop(1, 'rgba(139, 30, 40, 0.4)'); ctx.shadowColor = 'rgba(212, 175, 55, 0.5)'; ctx.shadowBlur = 10; } 
        else { bg.addColorStop(0, 'rgba(35, 25, 20, 0.95)'); bg.addColorStop(1, 'rgba(20, 15, 10, 0.95)'); }
        
        ctx.fillStyle = bg; ctx.beginPath(); ctx.roundRect(-btn.w/2, -btn.h/2, btn.w, btn.h, 4); ctx.fill();
        ctx.strokeStyle = isLocked ? '#555' : (hover ? '#fff' : '#d4af37'); ctx.lineWidth = hover ? 1.5 : 1; ctx.stroke();
        
        ctx.fillStyle = isLocked ? '#777' : (hover ? '#fff' : '#d4af37'); ctx.font = `20px ${FONT_FAMILY}`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        let lines = wrapText(ctx, text, btn.w - 20); let startY = -((lines.length - 1) * 12);
        lines.forEach((l, i) => { ctx.fillText(l, 0, startY + i * 24); });
        ctx.restore();
        
        if(!isLocked) clickZones.push({ id: id, x: btn.x, y: btn.y, w: btn.w, h: btn.h });
    }

        }

        let boxH = padding * 2 + contentH + (options ? totalBtnH + 15 : 35);
        let boxY = ch - boxH - 20;

            ctx.beginPath(); ctx.roundRect(tX, tY, tW, tH, 4); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
            ctx.shadowBlur = 0; ctx.fillStyle = '#111'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

        } else {
            grad.addColorStop(0, '#151515'); grad.addColorStop(1, '#050505'); ctx.fillStyle = grad; ctx.fillRect(0, 0, cw, ch);
        }
    }

    function gameLoop(timestamp) {
        if (!timestamp) timestamp = performance.now(); if (!lastTime) lastTime = timestamp;
        dt = (timestamp - lastTime) / 1000 || 0; if (dt > 0.1) dt = 0.016; 
        lastTime = timestamp; time += dt; if (isNaN(time)) time = 0;

        mouse.x += (mouse.targetX - mouse.x) * 10 * dt; mouse.y += (mouse.targetY - mouse.y) * 10 * dt;
        if (cameraShake.amount > 0.1) { cameraShake.x = (Math.random() - 0.5) * cameraShake.amount; cameraShake.y = (Math.random() - 0.5) * cameraShake.amount; cameraShake.amount *= 0.9; } 
        else { cameraShake.x = 0; cameraShake.y = 0; }

        ctx.save(); ctx.scale(dpr, dpr); ctx.translate(cameraShake.x, cameraShake.y);

        if ([STATES.DAY_TRANSITION, STATES.TITLE, STATES.END, STATES.LOADING, STATES.MODE_SELECT, STATES.FREE_MENU].includes(currentState)) globalAlpha += (1 - globalAlpha) * dt * 2;
        else globalAlpha = 1;
        if (isNaN(globalAlpha)) globalAlpha = 1; ctx.globalAlpha = globalAlpha;

        drawSceneBackground(ctx);
        ctx.globalCompositeOperation = 'screen'; dustParticles.forEach(p => { p.update(dt); p.draw(ctx); }); ctx.globalCompositeOperation = 'source-over';

        mainCharacter.update(dt); Object.values(npcs).forEach(npc => npc.update(dt));
        
        let activeCharacter = mainCharacter;
        if (currentState !== STATES.LOADING) {
            if ([STATES.STORY, STATES.QUESTION, STATES.FEEDBACK].includes(currentState)) {
                let stage = currentStage || introStage; let cn = stage.character || "";
                if (cn.includes("春桃") || cn.includes("丫鬟")) activeCharacter = npcs.maid;
                else if (cn.includes("總管") || cn.includes("管事")) activeCharacter = npcs.chef;
                else if (cn.includes("張大人") || cn.includes("太醫")) activeCharacter = npcs.doctor;
                else if (cn.includes("蘇氏") || cn.includes("醫女")) activeCharacter = npcs.medic;
                else activeCharacter = mainCharacter;
            }
            if (![STATES.DAY_TRANSITION, STATES.TITLE, STATES.END, STATES.LOADING, STATES.FREE_MENU].includes(currentState)) {
                let charScale = Math.max(1.0, Math.min(cw/600, ch/800) * 2.2);
                activeCharacter.draw(ctx, cw/2, ch/2 + 100, charScale);
            }
        }

        clickZones = []; canvas.style.cursor = 'crosshair'; 

        const sysBtn = document.getElementById('btn-sys-toggle');
        if([STATES.TITLE, STATES.DAY_TRANSITION, STATES.STORY, STATES.QUESTION, STATES.FEEDBACK, STATES.FREE_MENU].includes(currentState)) {
            sysBtn.style.display = 'block';
        } else { sysBtn.style.display = 'none'; }

        if (currentState === STATES.LOADING) {
             ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,cw,ch); ctx.textAlign = 'center'; ctx.fillStyle = '#d4af37'; ctx.font = `bold 30px ${FONT_FAMILY}`; ctx.fillText("載入產科知識庫中...", cw/2, ch/2);
        }
        else if (currentState === STATES.TITLE) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,cw,ch); ctx.textAlign = 'center'; ctx.shadowColor = '#d4af37'; ctx.shadowBlur = 20;
            ctx.fillStyle = '#f0ebd8'; let ts = Math.max(40, Math.min(80, cw * 0.08)); ctx.font = `bold ${ts}px ${FONT_FAMILY}`; ctx.fillText("汴京娘子調養記", cw/2, ch/2 - 120); ctx.shadowBlur = 0;
            ctx.fillStyle = '#d4af37'; ctx.font = `${ts*0.35}px ${FONT_FAMILY}`; ctx.fillText("— 產科衛教專業版 —", cw/2, ch/2 - 50);
            if(globalData.playCount > 0) { ctx.fillStyle = '#82c0d9'; ctx.font = `18px ${FONT_FAMILY}`; ctx.fillText(`【多周目繼承】初始知識+10, 嬰兒健康+10`, cw/2, ch/2); }
            drawButton(ctx, 'btn_start', {x: cw/2 - 120, y: ch/2 + 80, w: 240, h: 60}, globalData.playCount > 0 ? "重啟產褥期" : "進入產褥期照護");
        }
        else if (currentState === STATES.DAY_TRANSITION) {
            ctx.fillStyle = 'rgba(10,10,12,0.8)'; ctx.fillRect(0,0,cw,ch);
            let dayInfo = daysData[Math.min(currentDay - 1, daysData.length - 1)];
            let titleText = gameMode === "free" ? `孕期照護 第 ${currentDay} 天` : dayInfo.day;
            let eventText = gameMode === "free" ? "侯府的日常依舊。今日您將繼續面對各種產科與孕期照護的挑戰，守護母胎安康。" : dayInfo.event;
            
            ctx.textAlign = 'center'; ctx.shadowColor = '#d4af37'; ctx.shadowBlur = 15;
            ctx.fillStyle = '#d4af37'; ctx.font = `bold 52px ${FONT_FAMILY}`; ctx.fillText(titleText, cw/2, ch/2 - 80); ctx.shadowBlur = 0;
            ctx.fillStyle = '#f0ebd8'; ctx.font = `24px ${FONT_FAMILY}`;
            let lines = wrapText(ctx, eventText, Math.min(650, cw - 60)); lines.forEach((l, i) => ctx.fillText(l, cw/2, ch/2 - 10 + i*36));
            ctx.globalAlpha = (Math.sin(time * 3) + 1) * 0.5 * globalAlpha; ctx.fillStyle = '#d4af37'; ctx.font = `bold 20px ${FONT_FAMILY}`; ctx.fillText("◇ 點擊開啟今日衛教篇章 ◇", cw/2, ch/2 + 150); ctx.globalAlpha = globalAlpha;
            clickZones.push({ id: 'screen_next_day', x: 0, y: 0, w: cw, h: ch });
        }
        else if (currentState === STATES.MODE_SELECT) {
            drawDatePanel(ctx); drawStatsPanel(ctx);
            let options = [
                { text: "【重新體驗七日衛教模式】重新開始產褥期挑戰。" },
                { text: "【進入自由照護模式】開啟無限孕產衛教挑戰。" }
            ];
            renderDialog(ctx, "【七日衛教完成】", "恭喜夫人完成產後七日照護學習。接下來，您打算...", options);
        }
        else if (currentState === STATES.FREE_MENU) {
            drawDatePanel(ctx); drawStatsPanel(ctx);
            let options = [
                { text: "【產科回診】前往太醫院請教醫療觀念" },
                { text: "【育兒照護】向醫女學習新生兒與產婦照護" },
                { text: "【膳食調養】吩咐膳房準備發奶與恢復藥膳" },
                { text: "【親子時光】在臥房親自哺育並安撫寶寶" },
                { text: "【結束照護體驗】觀看最終人生結業報告" }
            ];
            renderDialog(ctx, "侯府日常 (無盡衛教模式)", "您將持續面對隨機產科衛教挑戰。今日您打算進行哪方面的學習：", options);
        }
        else if (currentState === STATES.STORY) { drawDatePanel(ctx); drawStatsPanel(ctx); renderDialog(ctx, currentStage.character, currentStage.story[currentStoryLine], null); }
        else if (currentState === STATES.QUESTION) { drawDatePanel(ctx); drawStatsPanel(ctx); renderDialog(ctx, currentStage.character || "內心抉擇", currentStage.question, currentStage.options); }
        else if (currentState === STATES.FEEDBACK) { drawDatePanel(ctx); drawStatsPanel(ctx); renderDialog(ctx, "衛教結果", selectedOptionFeedback, null); }
        else if (currentState === STATES.END) {
            ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(0,0,cw,ch); ctx.textAlign = 'center'; 
            ctx.fillStyle = currentEnding.color; ctx.font = `bold 56px ${FONT_FAMILY}`; ctx.fillText(currentEnding.title, cw/2, ch/2 - 130);
            ctx.fillStyle = '#f0ebd8'; ctx.font = `22px ${FONT_FAMILY}`; 
            let endLines = wrapText(ctx, currentEnding.desc, Math.min(750, cw - 60)); endLines.forEach((l, i) => ctx.fillText(l, cw/2, ch/2 - 40 + i*36));
            drawButton(ctx, 'btn_restart', {x: cw/2 - 240, y: ch/2 + 140, w: 220, h: 60}, "再次體驗衛教");
            drawButton(ctx, 'btn_home', {x: cw/2 + 20, y: ch/2 + 140, w: 220, h: 60}, "返回標題畫面");
        }

        floatingTexts = floatingTexts.filter(t => t.life > 0); floatingTexts.forEach(t => { t.update(); t.draw(ctx); });
        if (bloomIntensity > 0) { ctx.globalCompositeOperation = 'screen'; ctx.fillStyle = `rgba(${bloomColor}, ${bloomIntensity * 0.3})`; ctx.fillRect(0, 0, cw, ch); bloomIntensity -= dt * 1.5; ctx.globalCompositeOperation = 'source-over'; }
        ctx.restore(); requestAnimationFrame(gameLoop);
    }

    function handleInteraction(cx, cy) {
        if(document.getElementById('sys-menu').style.display === 'flex') return;
        
        let clicked = clickZones.find(z => cx >= z.x && cx <= z.x + z.w && cy >= z.y && cy <= z.y + z.h);
        
        if (currentState === STATES.TITLE && clicked && clicked.id === 'btn_start') {
            currentDay = 1; gameMode = "tutorial"; globalAlpha = 0; currentStage = introStage; mainCharacter.setEmotion('normal'); currentState = STATES.STORY;
        }
        else if (currentState === STATES.DAY_TRANSITION && clicked && clicked.id === 'screen_next_day') {
            if (gameMode === "free") {
                globalAlpha = 0; currentState = STATES.FREE_MENU;
            } else {
                let role = daysData[currentDay - 1].role;
                let location = daysData[currentDay - 1].location;
                if (!activePools[role] || activePools[role].length === 0) resetPools(); 
                currentStage = activePools[role].pop();
                currentStage.location = location;
                
                if(mainCharacter && typeof mainCharacter.resetAppearance === 'function') {
                    mainCharacter.resetAppearance(); 
                } else if(mainCharacter && typeof mainCharacter.reset === 'function') {
                    mainCharacter.reset();
                }
                
                currentStoryLine = 0; currentState = STATES.STORY;
            }
        }
        else if (currentState === STATES.FREE_MENU && clicked && clicked.id.startsWith('opt_')) {
            let idx = parseInt(clicked.id.split('_')[1]);
            if (idx === 4) { 
                currentEnding = determineEnding(); globalAlpha = 0; currentState = STATES.END; mainCharacter.setEmotion('happy');
                return;
            }

            let effects = {}; let role = 'maid'; let location = '侯府';
            if (idx === 0) { effects = { babyHealth: 5, power: 5 }; role = 'doctor'; location = '太醫院'; }
            else if (idx === 1) { effects = { knowledge: 5, medical: 5 }; role = 'medic'; location = '書閣'; }
            else if (idx === 2) { effects = { virtue: 5 }; role = 'chef'; location = '廚房'; }
            else if (idx === 3) { effects = { bond: 5, family: 5 }; role = 'maid'; location = '侯府臥房'; }
            applyEffects(effects);

            if (!activePools[role] || activePools[role].length === 0) refillFreeModePools();
            currentStage = activePools[role].pop();
            currentStage.location = location;
            
            if(mainCharacter && typeof mainCharacter.resetAppearance === 'function') mainCharacter.resetAppearance();
            else if(mainCharacter && typeof mainCharacter.reset === 'function') mainCharacter.reset();
            
            currentStoryLine = 0; currentState = STATES.STORY;
        }
        else if (currentState === STATES.STORY && clicked && clicked.id === 'screen_next') {
            currentStoryLine++; if (currentStoryLine >= currentStage.story.length) currentState = STATES.QUESTION;
        }
        else if (currentState === STATES.QUESTION && clicked && clicked.id.startsWith('opt_')) {
            applyChoice(currentStage.options[parseInt(clicked.id.split('_')[1])]);
        }
        else if (currentState === STATES.FEEDBACK && clicked && clicked.id === 'screen_next') {
            if (currentStage === introStage) { currentState = STATES.DAY_TRANSITION; } 
            else {
                currentDay++; currentStoryLine = 0;
                if (currentDay > 7 && gameMode === "tutorial") { 
                    globalAlpha = 0; currentState = STATES.MODE_SELECT; mainCharacter.setEmotion('normal'); 
                } 
                else { globalAlpha = 0; currentState = STATES.DAY_TRANSITION; }
            }
        }
        else if (currentState === STATES.MODE_SELECT && clicked && clicked.id.startsWith('opt_')) {
            let idx = parseInt(clicked.id.split('_')[1]);
            if (idx === 0) {
                // 重新體驗七日衛教模式
                currentDay = 1; gameMode = "tutorial"; player.knowledge = 40; player.health = 60; player.babyHealth = 60; player.bond = 50;
                player.routes = { virtue: 0, power: 0, medical: 0, family: 0 }; resetPools();
                for(let key in player.affections) { player.affections[key].target = 20; player.affections[key].current = 20; player.affections[key].status = "陌生"; }
                globalAlpha = 0; currentStage = introStage; mainCharacter.setEmotion('normal'); currentState = STATES.STORY;
            } else {
                // 進入自由照護模式
                gameMode = "free"; globalAlpha = 0; currentState = STATES.DAY_TRANSITION;
            }
        }
        else if (currentState === STATES.END && clicked) {
            if (clicked.id === 'btn_restart') {
                currentDay = 1; gameMode = "tutorial"; player.knowledge = 40; player.health = 60; player.babyHealth = 60; player.bond = 50;
                player.routes = { virtue: 0, power: 0, medical: 0, family: 0 }; resetPools();
                for(let key in player.affections) { player.affections[key].target = 20; player.affections[key].current = 20; player.affections[key].status = "陌生"; }
                if(globalData.playCount > 0) { player.knowledge+=10; player.babyHealth+=10; }
                globalAlpha = 0; currentStage = introStage; mainCharacter.setEmotion('normal'); currentState = STATES.STORY;
            } else if (clicked.id === 'btn_home') { window.location.reload(); }
        }
    }

    canvas.addEventListener('mousedown', e => mouse.isDown = true);
    canvas.addEventListener('mouseup', e => { mouse.isDown = false; if (currentState !== STATES.LOADING) handleInteraction((e.clientX - canvas.getBoundingClientRect().left) * (cw / canvas.getBoundingClientRect().width), (e.clientY - canvas.getBoundingClientRect().top) * (ch / canvas.getBoundingClientRect().height)); });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); mouse.isDown = true; let rect = canvas.getBoundingClientRect(); mouse.targetX = (e.touches[0].clientX - rect.left) * (cw / rect.width); mouse.targetY = (e.touches[0].clientY - rect.top) * (ch / rect.height); }, {passive: false});
    canvas.addEventListener('touchend', e => { mouse.isDown = false; if (currentState !== STATES.LOADING) handleInteraction(mouse.targetX, mouse.targetY); });

    loadQuestions(); requestAnimationFrame(gameLoop);
</script>
</body>
</html>
